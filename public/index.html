<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrivateJournal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   PRIVATEJOURNAL — Design System
   DA : Rouge / Noir / Sombre — style PrivateSociety
   ═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

/* ─── Variables ───────────────────────────────────────────── */
:root {
  /* Backgrounds */
  --bg-0: #080808;
  --bg-1: #0f0f0f;
  --bg-2: #161616;
  --bg-3: #1e1e1e;
  --bg-4: #252525;

  /* Accent — Rouge */
  --red-1: #c0392b;
  --red-2: #e53935;
  --red-3: #ff4444;
  --red-4: #ff6b6b;
  --red-glow: rgba(229, 57, 53, 0.2);
  --red-glow-bright: rgba(229, 57, 53, 0.4);

  /* Borders */
  --border: rgba(255, 255, 255, 0.06);
  --border-bright: rgba(229, 57, 53, 0.3);
  --border-hover: rgba(255, 255, 255, 0.12);

  /* Text */
  --text-1: #f0f0f0;
  --text-2: #888888;
  --text-3: #444444;

  /* Semantic */
  --green: #22c55e;
  --amber: #f59e0b;
  --blue: #3b82f6;

  /* Legacy aliases (keep compat) */
  --emerald: #22c55e;
  --purple: #8b5cf6;
  --cyan: var(--red-3);
  --blue-bright: var(--red-4);
  --blue-glow: var(--red-glow);

  /* Typography */
  --font-head: 'Space Grotesk', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'Space Mono', monospace;

  /* Radius */
  --radius: 8px;
  --radius-lg: 12px;
}

/* ─── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Fond ambiant rouge très subtil */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200, 0, 0, 0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 100% 100%, rgba(180, 0, 0, 0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ─── Layout ──────────────────────────────────────────────── */
#app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ─── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform .3s cubic-bezier(.4, 0, .2, 1);
}

.sidebar-logo {
  padding: 24px 20px 18px;
  border-bottom: 1px solid var(--border);
}

.logo-mark { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--red-2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 16px var(--red-glow);
  flex-shrink: 0;
}

.logo-icon svg { width: 18px; height: 18px; color: #fff; }

.logo-text {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-1);
}

.logo-text span {
  color: var(--red-3);
}

.sidebar-user {
  padding: 12px 16px;
  margin: 10px;
  background: var(--bg-2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all .2s;
}

.sidebar-user:hover {
  border-color: var(--border-bright);
  background: var(--bg-3);
}

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--red-2);
  object-fit: cover;
  background: var(--bg-3);
}

.avatar-placeholder {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--red-2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  color: #fff;
  border: 1.5px solid var(--red-1);
  flex-shrink: 0;
}

.user-info .name { font-weight: 600; font-size: 13px; color: var(--text-1); }

.user-info .status {
  font-size: 10px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 1px;
}

.user-info .status::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 5px var(--green);
}

.sidebar-nav {
  flex: 1;
  padding: 6px 10px;
  overflow-y: auto;
}

.nav-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .14em;
  color: var(--text-3);
  text-transform: uppercase;
  padding: 14px 10px 5px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 1px;
  position: relative;
  border: 1px solid transparent;
}

.nav-item:hover { background: var(--bg-2); color: var(--text-1); }

.nav-item.active {
  background: rgba(229, 57, 53, 0.08);
  color: var(--red-4);
  border-color: rgba(229, 57, 53, 0.15);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 55%;
  background: var(--red-3);
  border-radius: 0 2px 2px 0;
}

.nav-icon {
  width: 16px; height: 16px;
  opacity: .5;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-icon svg { width: 16px; height: 16px; }
.nav-item.active .nav-icon { opacity: 1; color: var(--red-3); }
.nav-item:hover .nav-icon { opacity: .8; }

.nav-badge {
  margin-left: auto;
  background: var(--red-2);
  color: #fff;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 20px;
  font-weight: 700;
  font-family: var(--font-mono);
}

.sidebar-footer {
  padding: 10px;
  border-top: 1px solid var(--border);
}

/* ─── Main ────────────────────────────────────────────────── */
.main { flex: 1; margin-left: 240px; min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  height: 56px;
  background: rgba(8, 8, 8, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  letter-spacing: -0.01em;
}

.topbar-subtitle { font-size: 11px; color: var(--text-2); font-weight: 400; }

.page { padding: 24px 28px; flex: 1; }

/* ─── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}

.card:hover { border-color: var(--border-hover); }

.card-glow::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(200, 0, 0, 0.03), transparent 70%);
  pointer-events: none;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.card-title {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .1em;
}

/* ─── Stat Cards ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: all .2s;
  cursor: default;
}

.stat-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(0,0,0,.4);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: var(--accent, var(--red-2));
  opacity: .7;
}

.stat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-sub { font-size: 11px; color: var(--text-3); margin-top: 6px; }

/* ─── Charts ──────────────────────────────────────────────── */
.charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
.charts-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-wrap { position: relative; width: 100%; height: 260px; }
canvas { border-radius: 6px; }

/* ─── Table ───────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }

table { width: 100%; border-collapse: collapse; font-size: 12px; }

thead tr { background: var(--bg-2); }

thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: .1em;
  text-transform: uppercase;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: color .15s;
}

thead th:hover { color: var(--text-2); }

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,.03);
  transition: background .12s;
  cursor: pointer;
}

tbody tr:hover { background: var(--bg-2); }
tbody td { padding: 10px 14px; color: var(--text-2); white-space: nowrap; }
tbody td:first-child { color: var(--text-1); }

/* ─── Badges ──────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

.badge-win  { background: rgba(34,197,94,.1);  color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
.badge-loss { background: rgba(229,57,53,.1);   color: #f87171; border: 1px solid rgba(229,57,53,.2); }
.badge-be   { background: rgba(245,158,11,.1);  color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
.badge-open { background: rgba(255,255,255,.05); color: var(--text-2); border: 1px solid var(--border); }
.badge-buy  { background: rgba(34,197,94,.08);  color: #4ade80; }
.badge-sell { background: rgba(229,57,53,.08);   color: #f87171; }

/* ─── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  border: none;
  font-family: var(--font-body);
  letter-spacing: .01em;
}

.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.btn-primary {
  background: var(--red-2);
  color: #fff;
  box-shadow: 0 0 16px var(--red-glow);
}

.btn-primary:hover {
  background: var(--red-3);
  box-shadow: 0 4px 20px var(--red-glow-bright);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  background: var(--bg-2);
  color: var(--text-1);
  border-color: var(--border-hover);
}

.btn-danger {
  background: rgba(229,57,53,.1);
  color: var(--red-3);
  border: 1px solid rgba(229,57,53,.2);
}

.btn-danger:hover { background: rgba(229,57,53,.18); }

.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-icon { padding: 7px; border-radius: 7px; }

/* ─── Forms ───────────────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }

label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: .1em;
  text-transform: uppercase;
}

input, select, textarea {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 12px;
  color: var(--text-1);
  font-size: 13px;
  font-family: var(--font-body);
  transition: border-color .15s;
  width: 100%;
  outline: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--red-2);
  box-shadow: 0 0 0 3px rgba(229,57,53,.1);
}

input::placeholder, textarea::placeholder { color: var(--text-3); }
select option { background: var(--bg-2); color: var(--text-1); }
textarea { resize: vertical; min-height: 80px; }

/* ─── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .15s;
}

.modal {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 660px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 30px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(229,57,53,.05);
  animation: slideUp .2s cubic-bezier(.4, 0, .2, 1);
}

.modal-header {
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-1);
  z-index: 1;
  border-radius: 14px 14px 0 0;
}

.modal-title {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.modal-body { padding: 20px 24px; }
.modal-footer { padding: 14px 24px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); }

/* ─── Login Page ──────────────────────────────────────────── */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-0);
  position: relative;
  overflow: hidden;
}

/* Grain texture */
.login-page::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .025;
  pointer-events: none;
  z-index: 0;
}

/* Red accent lines */
.login-page::before {
  content: '';
  position: absolute;
  width: 1px;
  height: 60%;
  background: linear-gradient(180deg, transparent, rgba(229,57,53,.4), transparent);
  left: 50%;
  top: 20%;
  pointer-events: none;
}

.login-wrap {
  display: flex;
  width: 100%;
  max-width: 860px;
  min-height: 520px;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
  z-index: 1;
  box-shadow: 0 40px 80px rgba(0,0,0,.6);
}

.login-left {
  flex: 1;
  background: var(--bg-1);
  padding: 44px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

/* Red vertical accent on login left */
.login-left::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--red-2), transparent);
}

.login-right {
  width: 380px;
  background: var(--bg-0);
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.login-logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
}

.login-logo-icon {
  width: 40px; height: 40px;
  background: var(--red-2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px var(--red-glow);
}

.login-logo-icon svg { width: 22px; height: 22px; color: #fff; }

.login-brand {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.login-brand span { color: var(--red-3); }

.login-tagline {
  color: var(--text-2);
  font-size: 13px;
  line-height: 1.7;
  margin-bottom: 36px;
  max-width: 300px;
}

.features-list { display: flex; flex-direction: column; gap: 11px; }

.feature-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-2);
}

.feature-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--red-3);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--red-glow);
}

.login-footer-brand {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: .05em;
}

/* Auth form */
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 26px;
  background: var(--bg-2);
  border-radius: var(--radius);
  padding: 3px;
}

.auth-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  color: var(--text-3);
  letter-spacing: .02em;
}

.auth-tab.active {
  background: var(--bg-3);
  color: var(--text-1);
}

.auth-title {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.auth-sub { font-size: 12px; color: var(--text-3); margin-bottom: 22px; }

.auth-form { display: flex; flex-direction: column; gap: 12px; }

.input-group { position: relative; }

.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.input-icon svg { width: 14px; height: 14px; }

.auth-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 12px 11px 36px;
  color: var(--text-1);
  font-size: 13px;
  font-family: var(--font-body);
  transition: border-color .15s;
  outline: none;
}

.auth-input:focus {
  border-color: var(--red-2);
  box-shadow: 0 0 0 3px rgba(229,57,53,.1);
}

.auth-input::placeholder { color: var(--text-3); }

.auth-btn {
  width: 100%;
  padding: 12px;
  background: var(--red-2);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-body);
  box-shadow: 0 4px 14px var(--red-glow);
  margin-top: 2px;
  letter-spacing: .01em;
}

.auth-btn:hover {
  background: var(--red-3);
  box-shadow: 0 6px 20px var(--red-glow-bright);
  transform: translateY(-1px);
}

.auth-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.auth-error {
  background: rgba(229,57,53,.08);
  border: 1px solid rgba(229,57,53,.2);
  color: var(--red-4);
  border-radius: var(--radius);
  padding: 9px 12px;
  font-size: 12px;
}

.auth-success {
  background: rgba(34,197,94,.08);
  border: 1px solid rgba(34,197,94,.2);
  color: #4ade80;
  border-radius: var(--radius);
  padding: 9px 12px;
  font-size: 12px;
}

.pwd-strength {
  height: 2px;
  border-radius: 2px;
  margin-top: 5px;
  transition: all .3s;
  background: var(--bg-3);
}

@media(max-width: 768px) {
  .login-wrap { flex-direction: column; max-width: 400px; min-height: auto; }
  .login-left { display: none; }
  .login-right { width: 100%; }
}

/* ─── Filters ─────────────────────────────────────────────── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }

.filter-input {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  color: var(--text-1);
  font-size: 12px;
  font-family: var(--font-body);
  transition: border-color .15s;
  outline: none;
}

.filter-input:focus { border-color: var(--red-2); }

/* ─── Progress ────────────────────────────────────────────── */
.progress-bar {
  background: var(--bg-3);
  border-radius: 3px;
  height: 6px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--red-1), var(--red-3));
  transition: width .5s cubic-bezier(.4, 0, .2, 1);
}

/* ─── Tabs ────────────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-2);
  padding: 3px;
  border-radius: var(--radius);
  width: fit-content;
  margin-bottom: 20px;
}

.tab {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  color: var(--text-3);
}

.tab.active { background: var(--bg-1); color: var(--text-1); }

/* ─── Animations ──────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.skeleton {
  background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 5px;
}

/* ─── Heatmap ─────────────────────────────────────────────── */
.heatmap { display: grid; grid-template-columns: repeat(53, 1fr); gap: 2px; margin-top: 8px; }
.heatmap-cell { aspect-ratio: 1; border-radius: 2px; background: var(--bg-3); cursor: pointer; transition: transform .1s; }
.heatmap-cell:hover { transform: scale(1.4); }

/* ─── Tooltip ─────────────────────────────────────────────── */
.tooltip { position: relative; }
.tooltip-text {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-3);
  border: 1px solid var(--border-hover);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  white-space: nowrap;
  z-index: 300;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s;
  font-family: var(--font-mono);
}
.tooltip:hover .tooltip-text { opacity: 1; }

/* ─── Account Cards ───────────────────────────────────────── */
.account-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.account-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all .18s;
  cursor: pointer;
}

.account-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}

.account-type {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: var(--font-mono);
}

/* ─── PnL Colors ──────────────────────────────────────────── */
.pnl-pos { color: var(--green); font-family: var(--font-mono); font-weight: 700; }
.pnl-neg { color: var(--red-3); font-family: var(--font-mono); font-weight: 700; }
.pnl-neu { color: var(--amber); font-family: var(--font-mono); font-weight: 700; }

/* ─── Misc ────────────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-3); }
.empty-icon { margin-bottom: 10px; opacity: .3; }
.empty-icon svg { width: 36px; height: 36px; }
.empty-text { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-2); }
.empty-sub { font-size: 12px; }

.tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  background: rgba(229,57,53,.08);
  color: var(--red-4);
  border: 1px solid rgba(229,57,53,.15);
  margin: 1px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* Scrollbars */
.scrollbar-thin::-webkit-scrollbar { width: 3px; }
.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
.scrollbar-thin::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }
.sidebar-nav::-webkit-scrollbar { width: 2px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 4px;
  padding: 7px;
  cursor: pointer;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-2);
}
.hamburger span { width: 18px; height: 1.5px; background: var(--text-1); border-radius: 2px; transition: all .3s; }

/* Responsive */
@media(max-width: 1024px) {
  .charts-grid { grid-template-columns: 1fr; }
  .charts-grid-3 { grid-template-columns: 1fr 1fr; }
}

@media(max-width: 768px) {
  .sidebar { transform: translateX(-240px); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .page { padding: 16px 14px; }
  .hamburger { display: flex; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .charts-grid-3 { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .topbar { padding: 0 14px; }
}

// ═══════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════
const API = 'https://privatejournal-backend-production.up.railway.app/api';

let state = {
  user: null,
  authTab: 'login',
  authError: '',
  authSuccess: '',
  page: 'dashboard',
  trades: [],
  accounts: [],
  stats: null,
  equityCurve: [],
  monthly: [],
  byAsset: [],
  byWeekday: [],
  bySetup: [],
  calendar: {},
  loading: true,
  modalOpen: false,
  modalType: null,
  editTrade: null,
  editAccount: null,
  filters: { search: '', asset: '', type: '', status: '', from: '', to: '' },
  page_num: 1,
  totalTrades: 0,
  selectedAccount: 'all',
  charts: {}
};

// ═══════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════
function getToken() {
  return localStorage.getItem('pj_token');
}

let pendingScreenshots = [];

async function uploadScreenshots(input) {
  const files = Array.from(input.files);
  const progress = document.getElementById('upload-progress');
  const preview = document.getElementById('screenshot-preview');
  if (!preview) return;
  for (const file of files) {
    if (progress) progress.textContent = `Upload en cours... ${file.name}`;
    try {
      const formData = new FormData();
      formData.append('screenshot', file);
      const token = getToken();
      const r = await fetch(API + '/upload/screenshot', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error);
      pendingScreenshots.push(data.url);
      const img = document.createElement('div');
      img.style.cssText = 'position:relative;display:inline-block';
      img.innerHTML = `<img src="${data.url}" style="height:80px;border-radius:6px;border:1px solid var(--border);object-fit:cover;cursor:pointer" onclick="window.open('${data.url}')" /><button onclick="removeScreenshot('${data.url}',this.parentElement)" style="position:absolute;top:-6px;right:-6px;background:var(--red-2);border:none;border-radius:50%;width:18px;height:18px;color:#fff;cursor:pointer;font-size:10px;line-height:1">✕</button>`;
      preview.appendChild(img);
      if (progress) progress.textContent = `✅ ${file.name} uploadé !`;
    } catch(e) {
      if (progress) progress.textContent = `❌ Erreur: ${e.message}`;
    }
  }
  setTimeout(() => { const p = document.getElementById('upload-progress'); if(p) p.textContent = ''; }, 3000);
}

function removeScreenshot(url, el) {
  pendingScreenshots = pendingScreenshots.filter(s => s !== url);
  el.remove();
}

async function api(path, opts={}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { ...opts, headers });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'API Error');
  return data;
}

// ═══════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════
async function loadUser() {
  if (!getToken()) return false;
  try {
    state.user = await api('/auth/me');
    return true;
  } catch {
    localStorage.removeItem('pj_token');
    return false;
  }
}

async function loadAll() {
  state.loading = true;
  render();
  try {
    const acParam = state.selectedAccount !== 'all' ? `?accountId=${state.selectedAccount}` : '';
    const [stats, equity, monthly, byAsset, byWeekday, bySetup, cal] = await Promise.all([
      api('/stats/overview' + acParam),
      api('/stats/equity-curve' + acParam),
      api('/stats/monthly' + acParam),
      api('/stats/by-asset' + acParam),
      api('/stats/by-weekday' + acParam),
      api('/stats/by-setup' + acParam),
      api('/stats/calendar'),
    ]);
    state.stats = stats;
    state.equityCurve = equity;
    state.monthly = monthly;
    state.byAsset = byAsset;
    state.byWeekday = byWeekday;
    state.bySetup = bySetup;
    state.calendar = cal;
  } catch(e) { console.warn('Stats error:', e.message); }
  await loadTrades();
  await loadAccounts();
  state.loading = false;
  render();
}

async function loadTrades() {
  const f = state.filters;
  const p = new URLSearchParams({ page: state.page_num, limit: 50, sortBy: 'date', sortDir: '-1' });
  if (f.search) p.set('search', f.search);
  if (f.asset) p.set('asset', f.asset);
  if (f.type) p.set('type', f.type);
  if (f.status) p.set('status', f.status);
  if (f.from) p.set('from', f.from);
  if (f.to) p.set('to', f.to);
  if (state.selectedAccount !== 'all') p.set('accountId', state.selectedAccount);
  try {
    const r = await api('/trades?' + p);
    state.trades = r.trades;
    state.totalTrades = r.total;
  } catch(e) { console.warn(e.message); }
}

async function loadAccounts() {
  try { state.accounts = await api('/accounts'); } catch(e) {}
}


// ═══════════════════════════════════════════════════════════
// CHART RENDERING
// ═══════════════════════════════════════════════════════════
function destroyChart(key) {
  if (state.charts[key]) { state.charts[key].destroy(); delete state.charts[key]; }
}

function renderEquityChart() {
  destroyChart('equity');
  const el = document.getElementById('equityChart');
  if (!el || !state.equityCurve.length) return;
  const data = state.equityCurve;
  const labels = data.map(d => new Date(d.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'short'}));
  const values = data.map(d => d.cumulative);
  const isPos = values[values.length-1] >= 0;
  const ctx = el.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,280);
  grad.addColorStop(0, isPos ? 'rgba(16,185,129,.35)' : 'rgba(239,68,68,.35)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  state.charts.equity = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: isPos ? '#10b981' : '#ef4444',
        backgroundColor: grad,
        borderWidth: 2,
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: isPos ? '#10b981' : '#ef4444'
      }]
    },
    options: chartDefaults({ y: { grid: { color: 'rgba(99,140,255,.06)' }, ticks: { color: '#64748b', callback: v => '$'+v.toLocaleString() } }, x: { grid: { display: false }, ticks: { color: '#64748b', maxTicksLimit: 8 } } })
  });
}

function renderMonthlyChart() {
  destroyChart('monthly');
  const el = document.getElementById('monthlyChart');
  if (!el || !state.monthly.length) return;
  const last12 = state.monthly.slice(-12);
  state.charts.monthly = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: last12.map(m => m.month),
      datasets: [{
        data: last12.map(m => m.pnl),
        backgroundColor: last12.map(m => m.pnl >= 0 ? 'rgba(16,185,129,.7)' : 'rgba(239,68,68,.7)'),
        borderColor: last12.map(m => m.pnl >= 0 ? '#10b981' : '#ef4444'),
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: chartDefaults({ y: { grid: { color: 'rgba(99,140,255,.06)' }, ticks: { color: '#64748b', callback: v => '$'+v } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } })
  });
}

function renderWinLossChart() {
  destroyChart('winloss');
  const el = document.getElementById('winlossChart');
  if (!el || !state.stats || !state.stats.totalTrades) return;
  const s = state.stats;
  state.charts.winloss = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['Wins', 'Losses', 'Break Even'],
      datasets: [{ data: [s.wins, s.losses, s.bes], backgroundColor: ['rgba(16,185,129,.8)', 'rgba(239,68,68,.8)', 'rgba(245,158,11,.8)'], borderColor: ['#10b981','#ef4444','#f59e0b'], borderWidth: 2, hoverOffset: 8 }]
    },
    options: { ...chartDefaults(), cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, font: { size: 12 } } }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} (${((ctx.raw/s.totalTrades)*100).toFixed(1)}%)` } } } }
  });
}

function renderWeekdayChart() {
  destroyChart('weekday');
  const el = document.getElementById('weekdayChart');
  if (!el || !state.byWeekday.length) return;
  const days = state.byWeekday.filter(d => d.trades > 0);
  state.charts.weekday = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: days.map(d => d.day.substring(0,3)),
      datasets: [
        { label: 'P&L', data: days.map(d => d.pnl), backgroundColor: days.map(d => d.pnl >= 0 ? 'rgba(16,185,129,.6)' : 'rgba(239,68,68,.6)'), borderRadius: 6, yAxisID: 'y' },
        { label: 'Winrate %', data: days.map(d => d.winrate), type: 'line', borderColor: '#3b82f6', pointBackgroundColor: '#3b82f6', tension: 0.4, yAxisID: 'y1', borderWidth: 2, pointRadius: 4 }
      ]
    },
    options: chartDefaults({
      y: { grid: { color: 'rgba(99,140,255,.06)' }, ticks: { color: '#64748b' } },
      y1: { position: 'right', grid: { display: false }, ticks: { color: '#3b82f6', callback: v => v+'%' }, max: 100, min: 0 },
      x: { grid: { display: false }, ticks: { color: '#64748b' } }
    })
  });
}

function renderAssetChart() {
  destroyChart('asset');
  const el = document.getElementById('assetChart');
  if (!el || !state.byAsset.length) return;
  const top = state.byAsset.slice(0, 8);
  state.charts.asset = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: top.map(a => a.asset),
      datasets: [{ label: 'P&L', data: top.map(a => a.pnl), backgroundColor: top.map(a => a.pnl >= 0 ? 'rgba(16,185,129,.7)' : 'rgba(239,68,68,.7)'), borderRadius: 6 }]
    },
    options: { ...chartDefaults({ y: { grid: { color: 'rgba(99,140,255,.06)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }), indexAxis: 'y' }
  });
}

function renderRRChart() {
  destroyChart('rr');
  const el = document.getElementById('rrChart');
  if (!el) return;
  const trades = state.trades.filter(t => t.rr);
  if (!trades.length) return;
  const bins = {};
  trades.forEach(t => {
    const b = Math.floor(t.rr * 2) / 2;
    bins[b] = (bins[b] || 0) + 1;
  });
  const sorted = Object.entries(bins).sort((a,b) => parseFloat(a[0]) - parseFloat(b[0]));
  state.charts.rr = new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels: sorted.map(([k]) => k+'R'),
      datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: sorted.map(([k]) => parseFloat(k) >= 1 ? 'rgba(16,185,129,.7)' : 'rgba(239,68,68,.7)'), borderRadius: 4 }]
    },
    options: chartDefaults({ y: { grid: { color: 'rgba(99,140,255,.06)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } })
  });
}

function chartDefaults(scales={}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a2035', borderColor: 'rgba(99,140,255,.2)', borderWidth: 1, titleColor: '#f1f5ff', bodyColor: '#94a3b8', padding: 10 } },
    scales
  };
}

function renderAllCharts() {
  setTimeout(() => {
    renderEquityChart();
    renderMonthlyChart();
    renderWinLossChart();
    renderWeekdayChart();
    if (state.page === 'stats') { renderAssetChart(); renderRRChart(); }
  }, 50);
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard() {
  const s = state.stats || {};
  const pnlClass = s.totalPnl > 0 ? 'pos' : s.totalPnl < 0 ? 'neg' : 'neu';
  const pnlColor = s.totalPnl > 0 ? 'var(--emerald)' : s.totalPnl < 0 ? 'var(--red)' : 'var(--amber)';
  const winrateColor = s.winrate >= 60 ? 'var(--emerald)' : s.winrate >= 45 ? 'var(--amber)' : 'var(--red)';

  const statCards = [
    { label: 'Winrate', value: s.winrate ? s.winrate.toFixed(1)+'%' : '—', sub: `${s.wins||0}W / ${s.losses||0}L`, accent: winrateColor, change: s.winrate > 50 ? '+' : '', changeClass: s.winrate >= 50 ? 'pos' : 'neg' },
    { label: 'P&L Total', value: s.totalPnl ? (s.totalPnl > 0 ? '+' : '') + '$' + Math.abs(s.totalPnl).toLocaleString() : '$0', sub: `${s.totalTrades||0} trades clôturés`, accent: pnlColor, changeClass: pnlClass },
    { label: 'Profit Factor', value: s.profitFactor ? (s.profitFactor === Infinity ? '∞' : s.profitFactor.toFixed(2)) : '—', sub: 'Objectif: > 1.5', accent: (s.profitFactor >= 1.5) ? 'var(--emerald)' : 'var(--red)' },
    { label: 'R:R Moyen', value: s.avgRR ? s.avgRR.toFixed(2)+'R' : '—', sub: 'Risk/Reward ratio', accent: s.avgRR >= 1.5 ? 'var(--emerald)' : 'var(--amber)' },
    { label: 'Drawdown Max', value: s.maxDrawdown ? '-$'+s.maxDrawdown.toLocaleString() : '$0', sub: 'Pire récession', accent: 'var(--red)' },
    { label: 'Expectancy', value: s.expectancy ? (s.expectancy > 0 ? '+' : '')+'$'+s.expectancy.toFixed(2) : '—', sub: 'Par trade', accent: s.expectancy > 0 ? 'var(--emerald)' : 'var(--red)' },
    { label: 'Gain Moyen', value: s.avgWin ? '+$'+s.avgWin.toFixed(2) : '—', sub: 'Par trade gagnant', accent: 'var(--emerald)' },
    { label: 'Perte Moyenne', value: s.avgLoss ? '-$'+s.avgLoss.toFixed(2) : '—', sub: 'Par trade perdant', accent: 'var(--red)' },
  ];

  return `
    <div class="stats-grid">
      ${statCards.map(c => `
        <div class="stat-card" style="--accent:${c.accent}">
          <div class="stat-label">${c.label}</div>
          <div class="stat-value" style="color:${c.accent}">${c.value}</div>
          <div class="stat-sub">${c.sub}</div>
        </div>
      `).join('')}
    </div>

    <div class="charts-grid">
      <div class="card card-glow">
        <div class="card-header">
          <div class="card-title">Equity Curve</div>
          <span style="font-size:12px;color:var(--text-2)">${state.equityCurve.length} points</span>
        </div>
        <div class="chart-wrap">
          ${state.equityCurve.length ? `<canvas id="equityChart"></canvas>` : `<div class="empty-state"><div class="empty-icon">${ICONS.stats}</div><div class="empty-text">Aucune donnée</div><div class="empty-sub">Ajoutez vos trades pour voir l'equity curve</div></div>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Répartition</div>
        </div>
        <div class="chart-wrap">
          ${s.totalTrades ? `<canvas id="winlossChart"></canvas>` : `<div class="empty-state"><div class="empty-icon">${ICONS.goals}</div><div class="empty-text">Aucune donnée</div></div>`}
        </div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card card-glow">
        <div class="card-header">
          <div class="card-title">Performance Mensuelle</div>
        </div>
        <div class="chart-wrap">
          ${state.monthly.length ? `<canvas id="monthlyChart"></canvas>` : `<div class="empty-state"><div class="empty-icon">${ICONS.journal}</div><div class="empty-text">Aucune donnée</div></div>`}
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Performance par Jour</div>
        </div>
        <div class="chart-wrap">
          ${state.byWeekday.some(d=>d.trades>0) ? `<canvas id="weekdayChart"></canvas>` : `<div class="empty-state"><div class="empty-icon">${ICONS.dashboard}</div><div class="empty-text">Aucune donnée</div></div>`}
        </div>
      </div>

    <div class="card" style="margin-bottom:24px">
      <div class="card-header">
        <div class="card-title">Heatmap Calendrier ${new Date().getFullYear()}</div>

        <div class="card-title">Trades Récents</div>
        <button class="btn btn-ghost btn-sm" onclick="setPage('journal')">Voir tout</button>

          <th>Date</th>
          <th>Actif</th>
          <th>Type</th>
          <th>Setup</th>
          <th>Entrée</th>
          <th>SL</th>
          <th>TP</th>
          <th>P&L</th>
          <th>R:R</th>
          <th>Statut</th>
          ${withActions ? '<th>Actions</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${trades.map(t => `
          <tr onclick="openViewTrade('${t._id}')">
            <td>${new Date(t.date).toLocaleDateString('fr-FR')}</td>
            <td style="font-family:var(--font-mono);font-weight:600;color:var(--text-1)">${t.asset}</td>
            <td><span class="badge badge-${t.type.toLowerCase()}">${t.type}</span></td>
            <td style="color:var(--text-2);max-width:120px;overflow:hidden;text-overflow:ellipsis">${t.setup || '—'}</td>
            <td style="font-family:var(--font-mono)">${t.entryPrice?.toFixed(5) || '—'}</td>
            <td style="font-family:var(--font-mono);color:var(--red)">${t.stopLoss?.toFixed(5) || '—'}</td>
            <td style="font-family:var(--font-mono);color:var(--emerald)">${t.takeProfit?.toFixed(5) || '—'}</td>
            <td class="${t.pnl > 0 ? 'pnl-pos' : t.pnl < 0 ? 'pnl-neg' : 'pnl-neu'}">${t.pnl != null ? (t.pnl > 0 ? '+' : '') + '$' + t.pnl.toFixed(2) : '—'}</td>
            <td style="font-family:var(--font-mono)">${t.rr ? t.rr.toFixed(2)+'R' : '—'}</td>
            <td><span class="badge badge-${t.status?.toLowerCase()}">${t.status || 'OPEN'}</span></td>
            ${withActions ? `
              <td onclick="event.stopPropagation()">
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-icon btn-sm" onclick="openEditTrade('${t._id}')" title="Modifier">${ICONS.edit}</button>

              </td>
            ` : ''}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

        { l: 'Expectancy', v: s.expectancy ? (s.expectancy>0?'+':'')+'$'+s.expectancy.toFixed(2) : '—', c: s.expectancy > 0 ? 'var(--emerald)' : 'var(--red)' }
      ].map(x=>`<div class="stat-card" style="--accent:${x.c}"><div class="stat-label">${x.l}</div><div class="stat-value" style="color:${x.c}">${x.v}</div></div>`).join('')}

function renderGoals() {
  const u = state.user || {};
  const s = state.stats || {};
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const currentMonthData = state.monthly.find(m => m.month === monthKey) || { pnl: 0, trades: 0, winrate: 0 };
  const monthProgress = u.monthlyGoal > 0 ? Math.min(100, (currentMonthData.pnl / u.monthlyGoal) * 100) : 0;
  const yearPnl = state.monthly.filter(m => m.month.startsWith(now.getFullYear().toString())).reduce((sum, m) => sum + m.pnl, 0);
  const yearProgress = u.annualGoal > 0 ? Math.min(100, (yearPnl / u.annualGoal) * 100) : 0;

  return `
    <div class="charts-grid" style="margin-bottom:24px">
      <div class="card card-glow">
        <div class="card-header">
          <div class="card-title">Objectif Mensuel — ${now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
          <button class="btn btn-ghost btn-sm" onclick="openGoalsEdit()">Modifier</button>
        </div>
        <div style="padding:10px 0">
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px">
            <div>
              <div style="font-family:var(--font-mono);font-size:36px;font-weight:500;color:${currentMonthData.pnl>=0?'var(--emerald)':'var(--red)'}">${currentMonthData.pnl>=0?'+':''}$${currentMonthData.pnl.toFixed(2)}</div>
              <div style="font-size:12px;color:var(--text-2);margin-top:4px">${currentMonthData.trades} trades ce mois · ${currentMonthData.winrate}% winrate</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:13px;color:var(--text-2)">Objectif</div>
              <div style="font-family:var(--font-mono);font-size:22px;color:var(--text-1)">$${(u.monthlyGoal||0).toLocaleString()}</div>
            </div>
          </div>
          <div class="progress-bar" style="height:12px">
            <div class="progress-fill" style="width:${Math.max(0,monthProgress)}%;background:${monthProgress>=100?'linear-gradient(90deg,var(--emerald),#34d399)':monthProgress>=50?'linear-gradient(90deg,var(--blue),var(--cyan))':'linear-gradient(90deg,var(--amber),#fbbf24)'}"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text-2)">
            <span>${monthProgress.toFixed(1)}% atteint</span>
            ${monthProgress >= 100 ? '<span style="color:var(--emerald)">Objectif atteint !</span>' : `<span>Reste: $${Math.max(0,((u.monthlyGoal||0)-currentMonthData.pnl)).toFixed(2)}</span>`}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Objectif Annuel — ${now.getFullYear()}</div>
        </div>
        <div style="padding:10px 0">
          <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px">
            <div>
              <div style="font-family:var(--font-mono);font-size:36px;font-weight:500;color:${yearPnl>=0?'var(--emerald)':'var(--red)'}">${yearPnl>=0?'+':''}$${yearPnl.toFixed(2)}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:13px;color:var(--text-2)">Objectif</div>
              <div style="font-family:var(--font-mono);font-size:22px;color:var(--text-1)">$${(u.annualGoal||0).toLocaleString()}</div>
            </div>
          </div>
          <div class="progress-bar" style="height:12px">
            <div class="progress-fill" style="width:${Math.max(0,yearProgress)}%"></div>
          </div>
          <div style="font-size:12px;color:var(--text-2);margin-top:6px">${yearProgress.toFixed(1)}% de l'objectif annuel</div>
        </div>
      </div>
    </div>

    <div class="card card-glow">
      <div class="card-header"><div class="card-title">Historique des Performances Mensuelles</div></div>
      <div class="chart-wrap" style="height:240px">
        ${state.monthly.length ? `<canvas id="monthlyChart"></canvas>` : `<div class="empty-state"><div class="empty-text">Aucune donnée</div></div>`}
      </div>
    </div>

    <div style="margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      ${[
        { l: 'Meilleur mois', v: state.monthly.length ? (() => { const best = [...state.monthly].sort((a,b)=>b.pnl-a.pnl)[0]; return `+$${best.pnl.toFixed(2)}`; })() : '—', c: 'var(--emerald)', sub: state.monthly.length ? [...state.monthly].sort((a,b)=>b.pnl-a.pnl)[0].month : '' },
        { l: 'Pire mois', v: state.monthly.length ? (() => { const worst = [...state.monthly].sort((a,b)=>a.pnl-b.pnl)[0]; return `$${worst.pnl.toFixed(2)}`; })() : '—', c: 'var(--red)', sub: state.monthly.length ? [...state.monthly].sort((a,b)=>a.pnl-b.pnl)[0].month : '' },

    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// CALENDAR HEATMAP
// ═══════════════════════════════════════════════════════════
function renderCalendarHeatmap() {
  const el = document.getElementById('calendarHeatmap');
  if (!el) return;
  const cal = state.calendar;
  const year = new Date().getFullYear();
  const startDate = new Date(year, 0, 1);
  const cells = [];
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const monthPositions = [];
  let prevMonth = -1;

  for (let i = 0; i < 371; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i - startDate.getDay());
    const key = d.toISOString().split('T')[0];
    const data = cal[key];
    const month = d.getMonth();
    if (month !== prevMonth) { monthPositions.push({ month, col: Math.floor(i/7) }); prevMonth = month; }

    let color = 'var(--bg-3)';
    if (data) {
      const intensity = Math.min(1, Math.abs(data.pnl) / 200);
      color = data.pnl > 0
        ? `rgba(16,185,129,${0.2 + intensity * 0.8})`
        : `rgba(239,68,68,${0.2 + intensity * 0.8})`;
    }
    cells.push({ key, data, color, d });
  }

  el.innerHTML = `
    <div style="overflow-x:auto;padding-bottom:8px">
      <div style="min-width:700px">
        <div style="display:flex;margin-bottom:4px;padding-left:30px">
          ${monthPositions.map(({ month, col }) => `<div style="position:absolute;left:${col * 14 + 30}px;font-size:10px;color:var(--text-3)">${months[month]}</div>`).join('')}
          <div style="height:12px;position:relative;width:100%">
            ${monthPositions.map(({ month, col }) => `<span style="position:absolute;left:${col * 14}px;font-size:10px;color:var(--text-3)">${months[month]}</span>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:3px">
          <div style="display:flex;flex-direction:column;gap:3px;padding-top:0px">
            ${['D','L','M','M','J','V','S'].map(d=>`<div style="height:12px;font-size:9px;color:var(--text-3);width:16px;line-height:12px">${d}</div>`).join('')}
          </div>
          <div style="display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;gap:3px">
            ${cells.map(c => `
              <div class="tooltip" style="width:12px;height:12px;border-radius:2px;background:${c.color};cursor:${c.data?'pointer':'default'};transition:transform .1s"
                ${c.data ? `onmouseover="this.style.transform='scale(1.4)'" onmouseout="this.style.transform=''"` : ''}>
                ${c.data ? `<span class="tooltip-text">${c.key}<br>${c.data.pnl>0?'+':''}$${c.data.pnl.toFixed(2)}<br>${c.data.trades} trades</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text-3)">
          <span>Moins</span>
          ${[0.1,0.3,0.5,0.7,0.9].map(o=>`<div style="width:10px;height:10px;border-radius:2px;background:rgba(16,185,129,${o})"></div>`).join('')}
          <span>Plus (gains)</span>
          <span style="margin-left:16px">Moins</span>
          ${[0.1,0.3,0.5,0.7,0.9].map(o=>`<div style="width:10px;height:10px;border-radius:2px;background:rgba(239,68,68,${o})"></div>`).join('')}
          <span>Plus (pertes)</span>
        </div>
      </div>
    </div>
  `;
}

function renderModal() {
  switch(state.modalType) {
    case 'addTrade': return renderTradeModal(null);
    case 'editTrade': return renderTradeModal(state.editTrade);
    case 'viewTrade': return renderViewTradeModal(state.editTrade);
    case 'addAccount': return renderAccountModal(null);
    case 'editAccount': return renderAccountModal(state.editAccount);
    case 'goals': return renderGoalsModal();
    case 'importCSV': return renderImportCSVModal();
    case 'settings': return renderSettingsModal();
    default: return '';
  }
}

async function submitTrade(evt, id) {
  if (evt) evt.preventDefault();
  const form = document.getElementById('tradeForm');
  if (!form) return;
  const data = Object.fromEntries(new FormData(form));

  // Parse numerics
  ['entryPrice','exitPrice','stopLoss','takeProfit','pnl','rr','lotSize','commission'].forEach(f => {
    if (data[f] !== undefined && data[f] !== '') data[f] = parseFloat(data[f]);
    else delete data[f];
  });
  if (data.tags) data.tags = data.tags.split(',').map(t=>t.trim()).filter(Boolean);
  if (!data.accountId) delete data.accountId;
  if (pendingScreenshots.length > 0) data.screenshots = pendingScreenshots;

  try {
    if (id) {
      await api('/trades/' + id, { method: 'PUT', body: JSON.stringify(data) });
      showToast('Trade mis à jour ✅');
    } else {
      await api('/trades', { method: 'POST', body: JSON.stringify(data) });
      showToast('Trade enregistré ✅');
    }
    pendingScreenshots = []; // ← ici une seule fois
    closeModal();
    await loadAll();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteTrade(id) {
  if (!confirm('Supprimer ce trade ?')) return;
  try {
    await api('/trades/' + id, { method: 'DELETE' });
    showToast('Trade supprimé');
    closeModal();
    await loadAll();
  } catch(e) { showToast(e.message, 'error'); }
}

async function submitAccount(id) {
  const get = (selector) => document.getElementById(selector)?.value;
  const data = {
    name: get('acc-name'),
    broker: get('acc-broker'),
    type: get('acc-type'),
    currency: get('acc-currency'),
    initialBalance: parseFloat(get('acc-initial')),
    currentBalance: parseFloat(get('acc-current') || get('acc-initial')),
    target: get('acc-target') ? parseFloat(get('acc-target')) : undefined,
    maxDrawdown: get('acc-maxdd') ? parseFloat(get('acc-maxdd')) : undefined,
    notes: get('acc-notes')
  };
  if (!data.name || !data.initialBalance) { showToast('Remplissez les champs obligatoires', 'error'); return; }
  try {
    if (id) {
      await api('/accounts/' + id, { method: 'PUT', body: JSON.stringify(data) });
      showToast('Compte mis à jour ✅');
    } else {
      await api('/accounts', { method: 'POST', body: JSON.stringify(data) });
      showToast('Compte créé ✅');
    }
    closeModal();
    await loadAll();
  } catch(e) { showToast(e.message, 'error'); }
}

  const el = document.getElementById('pwd-strength');
  if (!el) return;
  const score = [val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)].filter(Boolean).length;
  const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
  const widths = ['0%', '25%', '50%', '75%', '100%'];
  el.style.background = colors[score] || 'transparent';
  el.style.width = widths[score];
}

async function submitLogin() {
  const email = document.getElementById('login-email')?.value?.trim();
  const password = document.getElementById('login-password')?.value;
  const btn = document.getElementById('login-btn');
  if (!email || !password) { state.authError = 'Remplissez tous les champs.'; render(); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Connexion…'; }
  try {
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    localStorage.setItem('pj_token', data.token);
    state.user = data.user;
    state.authError = '';
    await loadAll();
  } catch(e) {
    state.authError = e.message;
    render();
    if (btn) { btn.disabled = false; btn.textContent = 'Se connecter'; }
  }
}

async function submitRegister() {
  const username = document.getElementById('reg-username')?.value?.trim();
  const email = document.getElementById('reg-email')?.value?.trim();
  const password = document.getElementById('reg-password')?.value;
  const btn = document.getElementById('reg-btn');
  if (!username || !email || !password) { state.authError = 'Remplissez tous les champs.'; render(); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Création…'; }
  try {
    const data = await api('/auth/register', { method: 'POST', body: JSON.stringify({ username, email, password }) });
    localStorage.setItem('pj_token', data.token);
    state.user = data.user;
    state.authError = '';
    await loadAll();
  } catch(e) {
    state.authError = e.message;
    render();
    if (btn) { btn.disabled = false; btn.textContent = 'Créer mon compte'; }
  }
}

async function logout() {
  try {
    await api('/auth/logout', { method: 'POST' });
  } catch {}
  localStorage.removeItem('pj_token');
  state.user = null;
  state.authTab = 'login';
  state.authError = '';
  render();
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function showToast(msg, type='success') {
  const existing = document.querySelectorAll('.toast');
  existing.forEach(t => t.remove());
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--font-body);animation:slideUp .25s;box-shadow:0 8px 30px rgba(0,0,0,.4);${type==='error'?'background:#1a0a0a;color:#f87171;border:1px solid rgba(239,68,68,.3)':'background:#0a1a12;color:#34d399;border:1px solid rgba(16,185,129,.3)'}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}


// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  const loggedIn = await loadUser();
  if (loggedIn) {
    await loadAll();
  } else {
    state.loading = false;
    render();
  }
}

init();

</script>
