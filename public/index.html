<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrivateJournal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
:root {
  --bg-0:#080808;--bg-1:#0f0f0f;--bg-2:#161616;--bg-3:#1e1e1e;--bg-4:#252525;
  --red-1:#c0392b;--red-2:#e53935;--red-3:#ff4444;--red-4:#ff6b6b;
  --red-glow:rgba(229,57,53,.2);--red-glow-bright:rgba(229,57,53,.4);
  --border:rgba(255,255,255,.06);--border-bright:rgba(229,57,53,.3);--border-hover:rgba(255,255,255,.12);
  --text-1:#f0f0f0;--text-2:#888888;--text-3:#444444;
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --emerald:#22c55e;--purple:#8b5cf6;--cyan:var(--red-3);--blue-bright:var(--red-4);--blue-glow:var(--red-glow);
  --font-head:'Space Grotesk',sans-serif;--font-body:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;
  --radius:8px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-0);color:var(--text-1);font-family:var(--font-body);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(200,0,0,.04) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 100% 100%,rgba(180,0,0,.03) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{width:240px;min-height:100vh;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--red-2);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px var(--red-glow);flex-shrink:0}
.logo-icon svg{width:18px;height:18px;color:#fff}
.logo-text{font-family:var(--font-head);font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--text-1)}
.logo-text span{color:var(--red-3)}
.sidebar-user{padding:12px 16px;margin:10px;background:var(--bg-2);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s}
.sidebar-user:hover{border-color:var(--border-bright);background:var(--bg-3)}
.avatar{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--red-2);object-fit:cover;background:var(--bg-3)}
.avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--red-2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;border:1.5px solid var(--red-1);flex-shrink:0}
.user-info .name{font-weight:600;font-size:13px;color:var(--text-1)}
.user-info .status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:1px}
.user-info .status::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 5px var(--green)}
.sidebar-nav{flex:1;padding:6px 10px;overflow-y:auto}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text-3);text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s;color:var(--text-2);font-size:13px;font-weight:500;margin-bottom:1px;position:relative;border:1px solid transparent}
.nav-item:hover{background:var(--bg-2);color:var(--text-1)}
.nav-item.active{background:rgba(229,57,53,.08);color:var(--red-4);border-color:rgba(229,57,53,.15)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:55%;background:var(--red-3);border-radius:0 2px 2px 0}
.nav-icon{width:16px;height:16px;opacity:.5;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:16px;height:16px}
.nav-item.active .nav-icon{opacity:1;color:var(--red-3)}
.nav-item:hover .nav-icon{opacity:.8}
.nav-badge{margin-left:auto;background:var(--red-2);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;font-family:var(--font-mono)}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column}
.topbar { height:56px; background:rgba(8,8,8,.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:16px; position:sticky; top:0; z-index:50; }
.topbar-title { display:none; }
.topbar-left { display:flex; flex-direction:column; justify-content:center; min-width:180px; flex-shrink:0; }
.topbar-breadcrumb { display:flex; align-items:center; gap:6px; }
.topbar-brand { color:var(--red-3); font-family:var(--font-head); font-weight:700; font-size:14px; }
.topbar-sep { color:var(--text-3); font-size:11px; }
.topbar-page { color:var(--text-1); font-family:var(--font-head); font-size:13px; font-weight:600; }
.topbar-subtitle { font-size:10px; color:var(--text-3); margin-top:2px; font-weight:400; }
.topbar-nav { display:flex; align-items:center; gap:2px; flex:1; justify-content:center; }
.topbar-nav-item { padding:6px 14px; border-radius:6px; font-size:12px; font-weight:500; color:var(--text-2); cursor:pointer; transition:all .15s; white-space:nowrap; border:1px solid transparent; }
.topbar-nav-item:hover { background:var(--bg-2); color:var(--text-1); }
.topbar-nav-item.active { background:rgba(229,57,53,.1); color:var(--red-4); border-color:rgba(229,57,53,.2); }
.topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.topbar-avatar { cursor:pointer; }
.topbar-avatar-placeholder { width:32px; height:32px; border-radius:50%; background:var(--red-2); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
@media(max-width:768px) { .topbar-nav { display:none; } .topbar-left { display:none; } }
.page{padding:24px 28px;flex:1}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--border-hover)}
.card-glow::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(200,0,0,.03),transparent 70%);pointer-events:none}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-family:var(--font-head);font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;position:relative;overflow:hidden;transition:all .2s;cursor:default}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--accent,var(--red-2));opacity:.7}
.stat-label{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--text-1);line-height:1;letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:6px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.chart-wrap{position:relative;width:100%;height:260px}
canvas{border-radius:6px}
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--bg-2)}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color .15s}
thead th:hover{color:var(--text-2)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s;cursor:pointer}
tbody tr:hover{background:var(--bg-2)}
tbody td{padding:10px 14px;color:var(--text-2);white-space:nowrap}
tbody td:first-child{color:var(--text-1)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-mono)}
.badge-win{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.badge-loss{background:rgba(229,57,53,.1);color:#f87171;border:1px solid rgba(229,57,53,.2)}
.badge-be{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-open{background:rgba(255,255,255,.05);color:var(--text-2);border:1px solid var(--border)}
.badge-buy{background:rgba(34,197,94,.08);color:#4ade80}
.badge-sell{background:rgba(229,57,53,.08);color:#f87171}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:var(--font-body);letter-spacing:.01em}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-primary{background:var(--red-2);color:#fff;box-shadow:0 0 16px var(--red-glow)}
.btn-primary:hover{background:var(--red-3);box-shadow:0 4px 20px var(--red-glow-bright);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-2);color:var(--text-1);border-color:var(--border-hover)}
.btn-danger{background:rgba(229,57,53,.1);color:var(--red-3);border:1px solid rgba(229,57,53,.2)}
.btn-danger:hover{background:rgba(229,57,53,.18)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;border-radius:7px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase}
input,select,textarea{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text-1);font-size:13px;font-family:var(--font-body);transition:border-color .15s;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red-2);box-shadow:0 0 0 3px rgba(229,57,53,.1)}
input::placeholder,textarea::placeholder{color:var(--text-3)}
select option{background:var(--bg-2);color:var(--text-1)}
textarea{resize:vertical;min-height:80px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal{background:var(--bg-1);border:1px solid var(--border);border-radius:14px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 60px rgba(0,0,0,.6),0 0 0 1px rgba(229,57,53,.05);animation:slideUp .2s cubic-bezier(.4,0,.2,1)}
.modal-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-1);z-index:1;border-radius:14px 14px 0 0}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700;letter-spacing:-.01em}
.modal-body{padding:20px 24px}
.modal-footer{padding:14px 24px 20px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--border)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-0);position:relative;overflow:hidden}
.login-page::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:0}
.login-page::before{content:'';position:absolute;width:1px;height:60%;background:linear-gradient(180deg,transparent,rgba(229,57,53,.4),transparent);left:50%;top:20%;pointer-events:none}
.login-wrap{display:flex;width:100%;max-width:860px;min-height:520px;border-radius:16px;overflow:hidden;border:1px solid var(--border);position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.login-left{flex:1;background:var(--bg-1);padding:44px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--border);position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--red-2),transparent)}
.login-right{width:380px;background:var(--bg-0);padding:40px;display:flex;flex-direction:column;justify-content:center}
.login-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:36px}
.login-logo-icon{width:40px;height:40px;background:var(--red-2);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--red-glow)}
.login-logo-icon svg{width:22px;height:22px;color:#fff}
.login-brand{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:-.02em}
.login-brand span{color:var(--red-3)}
.login-tagline{color:var(--text-2);font-size:13px;line-height:1.7;margin-bottom:36px;max-width:300px}
.features-list{display:flex;flex-direction:column;gap:11px}
.feature-item{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-2)}
.feature-dot{width:4px;height:4px;border-radius:50%;background:var(--red-3);flex-shrink:0;box-shadow:0 0 6px var(--red-glow)}
.login-footer-brand{font-size:11px;color:var(--text-3);letter-spacing:.05em}
.auth-tabs{display:flex;gap:0;margin-bottom:26px;background:var(--bg-2);border-radius:var(--radius);padding:3px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-3);letter-spacing:.02em}
.auth-tab.active{background:var(--bg-3);color:var(--text-1)}
.auth-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
.auth-sub{font-size:12px;color:var(--text-3);margin-bottom:22px}
.auth-form{display:flex;flex-direction:column;gap:12px}
.input-group{position:relative}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;display:flex;align-items:center}
.input-icon svg{width:14px;height:14px}
.auth-input{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px 11px 36px;color:var(--text-1);font-size:13px;font-family:var(--font-body);transition:border-color .15s;outline:none}
.auth-input:focus{border-color:var(--red-2);box-shadow:0 0 0 3px rgba(229,57,53,.1)}
.auth-input::placeholder{color:var(--text-3)}
.auth-btn{width:100%;padding:12px;background:var(--red-2);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font-body);box-shadow:0 4px 14px var(--red-glow);margin-top:2px;letter-spacing:.01em}
.auth-btn:hover{background:var(--red-3);box-shadow:0 6px 20px var(--red-glow-bright);transform:translateY(-1px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-error{background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.2);color:var(--red-4);border-radius:var(--radius);padding:9px 12px;font-size:12px}
.auth-success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80;border-radius:var(--radius);padding:9px 12px;font-size:12px}
.pwd-strength{height:2px;border-radius:2px;margin-top:5px;transition:all .3s;background:var(--bg-3)}
@media(max-width:768px){.login-wrap{flex-direction:column;max-width:400px;min-height:auto}.login-left{display:none}.login-right{width:100%}}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-input{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;color:var(--text-1);font-size:12px;font-family:var(--font-body);transition:border-color .15s;outline:none}
.filter-input:focus{border-color:var(--red-2)}
.progress-bar{background:var(--bg-3);border-radius:3px;height:6px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red-1),var(--red-3));transition:width .5s cubic-bezier(.4,0,.2,1)}
.tabs{display:flex;gap:2px;background:var(--bg-2);padding:3px;border-radius:var(--radius);width:fit-content;margin-bottom:20px}
.tab{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-3)}
.tab.active{background:var(--bg-1);color:var(--text-1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton{background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:5px}
.heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px;margin-top:8px}
.heatmap-cell{aspect-ratio:1;border-radius:2px;background:var(--bg-3);cursor:pointer;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.4)}
.tooltip{position:relative}
.tooltip-text{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-3);border:1px solid var(--border-hover);border-radius:6px;padding:5px 10px;font-size:11px;white-space:nowrap;z-index:300;pointer-events:none;opacity:0;transition:opacity .12s;font-family:var(--font-mono)}
.tooltip:hover .tooltip-text{opacity:1}
.account-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.account-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:all .18s;cursor:pointer}
.account-card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.account-type{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-family:var(--font-mono)}
.pnl-pos{color:var(--green);font-family:var(--font-mono);font-weight:700}
.pnl-neg{color:var(--red-3);font-family:var(--font-mono);font-weight:700}
.pnl-neu{color:var(--amber);font-family:var(--font-mono);font-weight:700}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-3)}
.empty-icon{margin-bottom:10px;opacity:.3}
.empty-icon svg{width:36px;height:36px}
.empty-text{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text-2)}
.empty-sub{font-size:12px}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(229,57,53,.08);color:var(--red-4);border:1px solid rgba(229,57,53,.15);margin:1px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}
.scrollbar-thin::-webkit-scrollbar{width:3px}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}
.sidebar-nav::-webkit-scrollbar{width:2px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const API = 'https://privatejournal-backend-production.up.railway.app/api';

let state = {
  user:null, authTab:'login', authError:'', authSuccess:'',
  page:'dashboard',
  trades:[], accounts:[], stats:null, equityCurve:[], monthly:[],
  byAsset:[], byWeekday:[], bySetup:[], calendar:{},
  leaderboard:[], publicJournals:[], publicProfile:null,
  loading:true, modalOpen:false, modalType:null, editTrade:null, editAccount:null,
  filters:{search:'',asset:'',type:'',status:'',from:'',to:''},
  page_num:1, totalTrades:0, selectedAccount:'all', charts:{}
};

function getToken(){ return localStorage.getItem('pj_token'); }
let pendingScreenshots = [];

async function uploadScreenshots(input) {
  const files = Array.from(input.files);
  const progress = document.getElementById('upload-progress');
  const preview = document.getElementById('screenshot-preview');
  if (!preview) return;
  for (const file of files) {
    if (progress) progress.textContent = `Upload en cours... ${file.name}`;
    try {
      const formData = new FormData();
      formData.append('screenshot', file);
      const r = await fetch(API + '/upload/screenshot', { method:'POST', headers:{'Authorization':'Bearer '+getToken()}, body:formData });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error);
      pendingScreenshots.push(data.url);
      const img = document.createElement('div');
      img.style.cssText = 'position:relative;display:inline-block';
      img.innerHTML = `<img src="${data.url}" style="height:80px;width:120px;border-radius:6px;border:1px solid var(--border);object-fit:cover;cursor:zoom-in" onclick="openImagePreview('${data.url}')" /><button onclick="removeScreenshot('${data.url}',this.parentElement)" style="position:absolute;top:-6px;right:-6px;background:var(--red-2);border:none;border-radius:50%;width:18px;height:18px;color:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center">✕</button>`;
      preview.appendChild(img);
      if (progress) progress.textContent = `✅ ${file.name} uploadé !`;
    } catch(e) { if (progress) progress.textContent = `❌ Erreur: ${e.message}`; }
  }
  setTimeout(() => { const p = document.getElementById('upload-progress'); if(p) p.textContent=''; }, 3000);
}
function removeScreenshot(url, el) { pendingScreenshots = pendingScreenshots.filter(s=>s!==url); el.remove(); }
function openImagePreview(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .15s';
  overlay.onclick = ()=>overlay.remove();
  overlay.innerHTML = `<div style="position:relative;max-width:90vw;max-height:90vh"><img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;box-shadow:0 30px 60px rgba(0,0,0,.8)" /><button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:-14px;right:-14px;background:var(--red-2);border:none;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button></div>`;
  document.body.appendChild(overlay);
}

async function api(path, opts={}) {
  const token = getToken();
  const headers = {'Content-Type':'application/json',...opts.headers};
  if (token) headers['Authorization'] = 'Bearer '+token;
  const r = await fetch(API+path, {...opts, headers});
  const data = await r.json();
  if (!r.ok) throw new Error(data.error||'API Error');
  return data;
}

// ═══════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════
async function loadUser() {
  if (!getToken()) return false;
  try { state.user = await api('/auth/me'); return true; }
  catch { localStorage.removeItem('pj_token'); return false; }
}

async function loadAll() {
  state.loading = true; render();
  try {
    const acParam = state.selectedAccount !== 'all' ? `?accountId=${state.selectedAccount}` : '';
    const [stats, equity, monthly, byAsset, byWeekday, bySetup, cal] = await Promise.all([
      api('/stats/overview'+acParam), api('/stats/equity-curve'+acParam),
      api('/stats/monthly'+acParam), api('/stats/by-asset'+acParam),
      api('/stats/by-weekday'+acParam), api('/stats/by-setup'+acParam), api('/stats/calendar'),
    ]);
    state.stats=stats; state.equityCurve=equity; state.monthly=monthly;
    state.byAsset=byAsset; state.byWeekday=byWeekday; state.bySetup=bySetup; state.calendar=cal;
  } catch(e) { console.warn('Stats error:',e.message); }
  await loadTrades();
  await loadAccounts();
  await loadLeaderboard();
  await loadPublicJournals();
  state.loading = false; render();
}

async function loadTrades() {
  const f = state.filters;
  const p = new URLSearchParams({page:state.page_num,limit:50,sortBy:'date',sortDir:'-1'});
  if (f.search) p.set('search',f.search); if (f.asset) p.set('asset',f.asset);
  if (f.type) p.set('type',f.type); if (f.status) p.set('status',f.status);
  if (f.from) p.set('from',f.from); if (f.to) p.set('to',f.to);
  if (state.selectedAccount !== 'all') p.set('accountId',state.selectedAccount);
  try { const r = await api('/trades?'+p); state.trades=r.trades; state.totalTrades=r.total; }
  catch(e) { console.warn(e.message); }
}
async function loadAccounts() { try { state.accounts = await api('/accounts'); } catch(e){} }
async function loadLeaderboard() {
  try { state.leaderboard = await api('/stats/leaderboard'); }
  catch(e) { console.warn('Leaderboard error:',e.message); state.leaderboard=[]; }
}
async function loadPublicJournals() {
  try { const r = await fetch(API+'/public'); state.publicJournals = await r.json(); }
  catch(e) { state.publicJournals=[]; }
}
async function loadPublicProfile(username) {
  try {
    const r = await fetch(API + '/public/' + username);
    const data = await r.json();
    if (data.error) { showToast(data.error, 'error'); return; }
    state.publicProfile = data;
    state.page = 'publicProfile';
  } catch(e) { 
    showToast('Erreur réseau', 'error'); 
    return; 
  }
  render();
  setTimeout(() => {
    renderPublicEquityChart(state.publicProfile.equityCurve);
    renderPublicMonthlyChart(state.publicProfile.monthly);
  }, 80);
}

// ═══════════════════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════════════════
function destroyChart(key) { if(state.charts[key]){state.charts[key].destroy();delete state.charts[key];} }
function chartDefaults(scales={}) {
  return { responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2035',borderColor:'rgba(99,140,255,.2)',borderWidth:1,titleColor:'#f1f5ff',bodyColor:'#94a3b8',padding:10}},
    scales };
}
function renderEquityChart() {
  destroyChart('equity'); const el = document.getElementById('equityChart');
  if (!el||!state.equityCurve.length) return;
  const values = state.equityCurve.map(d=>d.cumulative);
  const isPos = values[values.length-1]>=0;
  const ctx = el.getContext('2d'); const grad = ctx.createLinearGradient(0,0,0,280);
  grad.addColorStop(0, isPos?'rgba(16,185,129,.35)':'rgba(239,68,68,.35)'); grad.addColorStop(1,'rgba(0,0,0,0)');
  state.charts.equity = new Chart(ctx,{type:'line',data:{labels:state.equityCurve.map(d=>new Date(d.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})),datasets:[{data:values,borderColor:isPos?'#10b981':'#ef4444',backgroundColor:grad,borderWidth:2,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:5}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b',callback:v=>'$'+v.toLocaleString()}},x:{grid:{display:false},ticks:{color:'#64748b',maxTicksLimit:8}}})});
}
function renderMonthlyChart() {
  destroyChart('monthly'); const el = document.getElementById('monthlyChart');
  if (!el||!state.monthly.length) return;
  const last12 = state.monthly.slice(-12);
  state.charts.monthly = new Chart(el.getContext('2d'),{type:'bar',data:{labels:last12.map(m=>m.month),datasets:[{data:last12.map(m=>m.pnl),backgroundColor:last12.map(m=>m.pnl>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderColor:last12.map(m=>m.pnl>=0?'#10b981':'#ef4444'),borderWidth:1,borderRadius:6}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b',callback:v=>'$'+v}},x:{grid:{display:false},ticks:{color:'#64748b'}}})});
}
function renderWinLossChart() {
  destroyChart('winloss'); const el = document.getElementById('winlossChart');
  if (!el||!state.stats||!state.stats.totalTrades) return;
  const s = state.stats;
  state.charts.winloss = new Chart(el.getContext('2d'),{type:'doughnut',data:{labels:['Wins','Losses','Break Even'],datasets:[{data:[s.wins,s.losses,s.bes],backgroundColor:['rgba(16,185,129,.8)','rgba(239,68,68,.8)','rgba(245,158,11,.8)'],borderColor:['#10b981','#ef4444','#f59e0b'],borderWidth:2,hoverOffset:8}]},options:{...chartDefaults(),cutout:'70%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',padding:12,font:{size:12}}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw} (${((ctx.raw/s.totalTrades)*100).toFixed(1)}%)`}}}}});
}
function renderWeekdayChart() {
  destroyChart('weekday'); const el = document.getElementById('weekdayChart');
  if (!el||!state.byWeekday.length) return;
  const days = state.byWeekday.filter(d=>d.trades>0);
  state.charts.weekday = new Chart(el.getContext('2d'),{type:'bar',data:{labels:days.map(d=>d.day.substring(0,3)),datasets:[{label:'P&L',data:days.map(d=>d.pnl),backgroundColor:days.map(d=>d.pnl>=0?'rgba(16,185,129,.6)':'rgba(239,68,68,.6)'),borderRadius:6,yAxisID:'y'},{label:'Winrate %',data:days.map(d=>d.winrate),type:'line',borderColor:'#3b82f6',pointBackgroundColor:'#3b82f6',tension:0.4,yAxisID:'y1',borderWidth:2,pointRadius:4}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b'}},y1:{position:'right',grid:{display:false},ticks:{color:'#3b82f6',callback:v=>v+'%'},max:100,min:0},x:{grid:{display:false},ticks:{color:'#64748b'}}})});
}
function renderAssetChart() {
  destroyChart('asset'); const el = document.getElementById('assetChart');
  if (!el||!state.byAsset.length) return;
  const top = state.byAsset.slice(0,8);
  state.charts.asset = new Chart(el.getContext('2d'),{type:'bar',data:{labels:top.map(a=>a.asset),datasets:[{label:'P&L',data:top.map(a=>a.pnl),backgroundColor:top.map(a=>a.pnl>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:6}]},options:{...chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b'}},x:{grid:{display:false},ticks:{color:'#64748b'}}}),indexAxis:'y'}});
}
function renderRRChart() {
  destroyChart('rr'); const el = document.getElementById('rrChart'); if (!el) return;
  const trades = state.trades.filter(t=>t.rr); if (!trades.length) return;
  const bins = {}; trades.forEach(t=>{ const b=Math.floor(t.rr*2)/2; bins[b]=(bins[b]||0)+1; });
  const sorted = Object.entries(bins).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0]));
  state.charts.rr = new Chart(el.getContext('2d'),{type:'bar',data:{labels:sorted.map(([k])=>k+'R'),datasets:[{data:sorted.map(([,v])=>v),backgroundColor:sorted.map(([k])=>parseFloat(k)>=1?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:4}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b'}},x:{grid:{display:false},ticks:{color:'#64748b'}}})});
}
function renderPublicEquityChart(equityCurve) {
  if (!equityCurve?.length) return; const el = document.getElementById('publicEquityChart'); if (!el) return;
  const values = equityCurve.map(d=>d.cumulative); const isPos = values[values.length-1]>=0;
  const ctx = el.getContext('2d'); const grad = ctx.createLinearGradient(0,0,0,260);
  grad.addColorStop(0,isPos?'rgba(34,197,94,.35)':'rgba(239,68,68,.35)'); grad.addColorStop(1,'rgba(0,0,0,0)');
  new Chart(ctx,{type:'line',data:{labels:equityCurve.map(d=>new Date(d.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})),datasets:[{data:values,borderColor:isPos?'#22c55e':'#ef4444',backgroundColor:grad,borderWidth:2,fill:true,tension:0.4,pointRadius:0}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b',callback:v=>'$'+v}},x:{grid:{display:false},ticks:{color:'#64748b',maxTicksLimit:8}}})});
}
function renderPublicMonthlyChart(monthly) {
  if (!monthly?.length) return; const el = document.getElementById('publicMonthlyChart'); if (!el) return;
  const last12 = monthly.slice(-12);
  new Chart(el.getContext('2d'),{type:'bar',data:{labels:last12.map(m=>m.month),datasets:[{data:last12.map(m=>m.pnl),backgroundColor:last12.map(m=>m.pnl>=0?'rgba(34,197,94,.7)':'rgba(239,68,68,.7)'),borderRadius:6}]},options:chartDefaults({y:{grid:{color:'rgba(99,140,255,.06)'},ticks:{color:'#64748b',callback:v=>'$'+v}},x:{grid:{display:false},ticks:{color:'#64748b'}}})});
}
function renderAllCharts() {
  setTimeout(()=>{
    renderEquityChart(); renderMonthlyChart(); renderWinLossChart(); renderWeekdayChart();
    if (state.page==='stats'){renderAssetChart();renderRRChart();}
  }, 50);
}

    {label:'Profit Factor',value:s.profitFactor?(s.profitFactor===Infinity?'∞':s.profitFactor.toFixed(2)):'—',sub:'Objectif: > 1.5',accent:s.profitFactor>=1.5?'var(--emerald)':'var(--red-3)'},

dy></table>`;

function renderAccounts() {
  const typeColors={Demo:'#3b82f6',Live:'#10b981',Challenge:'#f59e0b',Funded:'#8b5cf6',Prop:'#06b6d4'};
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
      <button class="btn btn-primary" onclick="openAddAccount()">${ICONS.plus} Nouveau Compte</button>
    </div>
    ${!state.accounts.length?`<div class="empty-state"><div class="empty-icon">${ICONS.accounts}</div><div class="empty-text">Aucun compte configuré</div><div class="empty-sub">Ajoutez vos comptes de trading pour suivre chacun séparément</div></div>`:`
      <div class="account-grid">
        ${state.accounts.map(a=>{
          const pnl=a.currentBalance-a.initialBalance, pnlPct=((pnl/a.initialBalance)*100).toFixed(2), progress=a.target?Math.min(100,(a.currentBalance/a.target*100)):0;
          return `<div class="account-card" onclick="openEditAccount('${a._id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><div style="font-family:var(--font-head);font-size:17px;font-weight:700">${a.name}</div><div style="font-size:12px;color:var(--text-2);margin-top:2px">${a.broker||'Broker non défini'}</div></div><span class="account-type" style="background:${typeColors[a.type]||'#3b82f6'}22;color:${typeColors[a.type]||'#3b82f6'}">${a.type}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px"><div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em">Capital Initial</div><div style="font-family:var(--font-mono);font-size:15px;margin-top:3px">${a.currency} ${a.initialBalance.toLocaleString()}</div></div><div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em">Capital Actuel</div><div style="font-family:var(--font-mono);font-size:15px;margin-top:3px">${a.currency} ${a.currentBalance.toLocaleString()}</div></div></div><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-2);border-radius:8px;margin-bottom:12px"><span style="font-size:12px;color:var(--text-2)">P&L</span><span class="pnl-${pnl>=0?'pos':pnl<0?'neg':'neu'}" style="font-size:15px">${pnl>=0?'+':''}${a.currency} ${pnl.toFixed(2)} <span style="font-size:11px;opacity:.7">(${pnl>=0?'+':''}${pnlPct}%)</span></span></div>${a.target?`<div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:4px"><span>Objectif: ${a.currency} ${a.target.toLocaleString()}</span><span>${progress.toFixed(1)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div></div>`:''}</div>`;
        }).join('')}
      </div>
    `}
  `;
}

// ═══════════════════════════════════════════════════════════
// GOALS
// ═══════════════════════════════════════════════════════════
function renderGoals() {
  const u=state.user||{}, now=new Date();
  const monthKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const cm=state.monthly.find(m=>m.month===monthKey)||{pnl:0,trades:0,winrate:0};
  const monthProg=u.monthlyGoal>0?Math.min(100,(cm.pnl/u.monthlyGoal)*100):0;
  const yearPnl=state.monthly.filter(m=>m.month.startsWith(now.getFullYear().toString())).reduce((s,m)=>s+m.pnl,0);
  const yearProg=u.annualGoal>0?Math.min(100,(yearPnl/u.annualGoal)*100):0;
  return `
    <div class="charts-grid" style="margin-bottom:24px">
      <div class="card card-glow"><div class="card-header"><div class="card-title">Objectif Mensuel — ${now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div><button class="btn btn-ghost btn-sm" onclick="openGoalsEdit()">Modifier</button></div><div style="padding:10px 0"><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px"><div><div style="font-family:var(--font-mono);font-size:36px;font-weight:500;color:${cm.pnl>=0?'var(--emerald)':'var(--red-3)'}">${cm.pnl>=0?'+':''}$${cm.pnl.toFixed(2)}</div><div style="font-size:12px;color:var(--text-2);margin-top:4px">${cm.trades} trades ce mois · ${cm.winrate}% winrate</div></div><div style="text-align:right"><div style="font-size:13px;color:var(--text-2)">Objectif</div><div style="font-family:var(--font-mono);font-size:22px">$${(u.monthlyGoal||0).toLocaleString()}</div></div></div><div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${Math.max(0,monthProg)}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text-2)"><span>${monthProg.toFixed(1)}% atteint</span>${monthProg>=100?'<span style="color:var(--emerald)">Objectif atteint !</span>':`<span>Reste: $${Math.max(0,(u.monthlyGoal||0)-cm.pnl).toFixed(2)}</span>`}</div></div></div>
      <div class="card"><div class="card-header"><div class="card-title">Objectif Annuel — ${now.getFullYear()}</div></div><div style="padding:10px 0"><div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px"><div><div style="font-family:var(--font-mono);font-size:36px;font-weight:500;color:${yearPnl>=0?'var(--emerald)':'var(--red-3)'}">${yearPnl>=0?'+':''}$${yearPnl.toFixed(2)}</div></div><div style="text-align:right"><div style="font-size:13px;color:var(--text-2)">Objectif</div><div style="font-family:var(--font-mono);font-size:22px">$${(u.annualGoal||0).toLocaleString()}</div></div></div><div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${Math.max(0,yearProg)}%"></div></div><div style="font-size:12px;color:var(--text-2);margin-top:6px">${yearProg.toFixed(1)}% de l'objectif annuel</div></div></div>
    </div>
    <div class="card card-glow"><div class="card-header"><div class="card-title">Historique des Performances Mensuelles</div></div><div class="chart-wrap" style="height:240px">${state.monthly.length?`<canvas id="monthlyChart"></canvas>`:`<div class="empty-state"><div class="empty-text">Aucune donnée</div></div>`}</div></div>
    <div style="margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
      ${state.monthly.length?[
        {l:'Meilleur mois',v:'+$'+[...state.monthly].sort((a,b)=>b.pnl-a.pnl)[0].pnl.toFixed(2),c:'var(--emerald)',sub:[...state.monthly].sort((a,b)=>b.pnl-a.pnl)[0].month},
        {l:'Pire mois',v:'$'+[...state.monthly].sort((a,b)=>a.pnl-b.pnl)[0].pnl.toFixed(2),c:'var(--red-3)',sub:[...state.monthly].sort((a,b)=>a.pnl-b.pnl)[0].month},
        {l:'Mois rentables',v:`${state.monthly.filter(m=>m.pnl>0).length}/${state.monthly.length}`,c:'var(--blue)',sub:`${(state.monthly.filter(m=>m.pnl>0).length/state.monthly.length*100).toFixed(0)}% des mois`},
      ].map(x=>`<div class="stat-card" style="--accent:${x.c}"><div class="stat-label">${x.l}</div><div class="stat-value" style="color:${x.c}">${x.v}</div><div class="stat-sub">${x.sub}</div></div>`).join(''):''}
    </div>
  `;
}

function renderLeaderboard() {
  const data = state.leaderboard||[];
  if (!data.length) return `<div class="empty-state" style="padding:80px 20px"><div style="font-size:56px;margin-bottom:16px">🏆</div><div class="empty-text">Aucun trader classé</div><div class="empty-sub">Les traders apparaîtront ici une fois qu'ils auront enregistré des trades</div></div>`;
  const top3=data.slice(0,3);
  const podiumOrder=top3.length>=3?[{t:top3[1],rank:2},{t:top3[0],rank:1},{t:top3[2],rank:3}]:top3.map((t,i)=>({t,rank:i+1}));
  const medals={1:'🥇',2:'🥈',3:'🥉'}, nameFg={1:'#f0c040',2:'#b0bec5',3:'#cd7f32'}, cardBg={1:'rgba(240,192,64,.06)',2:'rgba(176,190,197,.04)',3:'rgba(205,127,50,.04)'}, cardBdr={1:'rgba(240,192,64,.3)',2:'rgba(176,190,197,.18)',3:'rgba(205,127,50,.18)'}, padTop={1:'36px',2:'20px',3:'16px'};
  const fmtPnl=v=>(v>0?'+':'')+'$'+Math.abs(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const avatarColor=u=>{const p=['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#2c3e50','#d35400'];return p[u.charCodeAt(0)%p.length];};
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:36px;flex-wrap:wrap;gap:12px">
      <div><div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red-3);font-family:var(--font-mono);margin-bottom:6px">Hall of Fame</div><div style="font-family:var(--font-head);font-size:clamp(22px,3vw,34px);font-weight:800;letter-spacing:-.02em">Classement Traders</div></div>
      <div style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">${data.length} trader${data.length>1?'s':''} classé${data.length>1?'s':''}</div>
    </div>
    <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:32px;flex-wrap:wrap">
      ${podiumOrder.map(({t,rank})=>`<div style="flex:1;max-width:300px;min-width:180px;background:${cardBg[rank]};border:1px solid ${cardBdr[rank]};border-radius:14px;padding:${padTop[rank]} 18px 20px;text-align:center;transition:transform .2s,box-shadow .2s" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 16px 40px rgba(0,0,0,.5)'" onmouseout="this.style.transform='';this.style.boxShadow=''"><div style="font-size:42px;margin-bottom:10px">${medals[rank]}</div><div style="display:flex;justify-content:center;margin-bottom:10px"><div style="width:46px;height:46px;border-radius:50%;background:${avatarColor(t.username)};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff">${t.username.charAt(0).toUpperCase()}</div></div><div style="font-family:var(--font-head);font-size:16px;font-weight:700;color:${nameFg[rank]};margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.username}</div><div style="display:flex;flex-direction:column;gap:7px">${[{label:'PnL',value:fmtPnl(t.totalPnl),color:t.totalPnl>=0?'var(--emerald)':'var(--red-3)'},{label:'Trades',value:t.totalTrades,color:'var(--text-1)'},{label:'Winrate',value:t.winrate+'%',color:t.winrate>=50?'var(--emerald)':'var(--red-3)'}].map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:7px"><span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">${s.label}</span><span style="font-size:13px;font-weight:700;font-family:var(--font-mono);color:${s.color}">${s.value}</span></div>`).join('')}</div></div>`).join('')}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div class="card-title">Classement complet</div>
        <div style="display:flex;gap:6px">${[['totalPnl','💰 Gains'],['totalTrades','📊 Trades'],['winrate','🎯 Winrate']].map(([key,label],i)=>`<button class="btn btn-ghost btn-sm lb-sort-btn" data-sort="${key}" onclick="sortLeaderboard('${key}',this)" style="${i===0?'background:var(--bg-3);color:var(--text-1);border-color:var(--border-hover)':''}">${label}</button>`).join('')}</div>
      </div>
      <div class="table-wrap"><table><thead><tr><th style="width:48px">#</th><th>Trader</th><th>PnL Total</th><th>Trades</th><th>Winrate</th><th>Membre depuis</th></tr></thead><tbody id="lb-tbody">${renderLbRows(data)}</tbody></table></div>
    </div>
  `;
}
function renderLbRows(data) {
  const fmtPnl=v=>(v>0?'+':'')+'$'+Math.abs(v).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const avatarColor=u=>{const p=['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#2c3e50','#d35400'];return p[u.charCodeAt(0)%p.length];};
  const badgeBg=['rgba(240,192,64,.12)','rgba(176,190,197,.1)','rgba(205,127,50,.1)'], badgeFg=['#f0c040','#b0bec5','#cd7f32'];
  return data.map((t,i)=>{const rank=i+1,isTop=rank<=3,rowBg=isTop?`background:${['rgba(240,192,64,.03)','rgba(176,190,197,.02)','rgba(205,127,50,.02)'][rank-1]};`:'';return `<tr style="${rowBg}"><td><div style="width:32px;height:32px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--font-mono);background:${isTop?badgeBg[rank-1]:'rgba(255,255,255,.04)'};color:${isTop?badgeFg[rank-1]:'var(--text-3)'}">${rank}</div></td><td><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:50%;background:${avatarColor(t.username)};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0">${t.username.charAt(0).toUpperCase()}</div><span style="font-family:var(--font-head);font-weight:600;font-size:13px;color:${isTop?badgeFg[rank-1]:'var(--text-1)'}">${t.username}</span></div></td><td><span style="font-family:var(--font-mono);font-weight:700;color:${t.totalPnl>=0?'var(--emerald)':'var(--red-3)'}">${fmtPnl(t.totalPnl)}</span></td><td style="font-family:var(--font-mono);color:var(--text-1)">${t.totalTrades}</td><td><div style="display:flex;align-items:center;gap:8px"><div style="width:60px;height:3px;background:var(--bg-3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${t.winrate}%;background:${t.winrate>=50?'var(--emerald)':'var(--red-3)'};border-radius:2px"></div></div><span style="font-family:var(--font-mono);font-size:12px;color:${t.winrate>=50?'var(--emerald)':'var(--red-3)'}">${t.winrate}%</span></div></td><td style="color:var(--text-3);font-size:11px;font-family:var(--font-mono)">${new Date(t.memberSince).toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</td></tr>`;}).join('');
}
function sortLeaderboard(key,btn) {
  document.querySelectorAll('.lb-sort-btn').forEach(b=>{b.style.background='';b.style.color='';b.style.borderColor='';});
  btn.style.background='var(--bg-3)'; btn.style.color='var(--text-1)'; btn.style.borderColor='var(--border-hover)';
  const sorted=[...(state.leaderboard||[])].sort((a,b)=>b[key]-a[key]);
  const tbody=document.getElementById('lb-tbody'); if(tbody) tbody.innerHTML=renderLbRows(sorted);
}

  const {user, stats:s, trades, equityCurve, monthly} = data;
  const avatarColor=u=>{const p=['#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#2c3e50','#d35400'];return p[u.charCodeAt(0)%p.length];};
  return `

    ${!s?.totalTrades?`<div class="empty-state"><div class="empty-text">Aucun trade clôturé</div></div>`:`
      <div class="stats-grid" style="margin-bottom:24px">
        ${[
          {label:'PnL Total',value:(s.totalPnl>0?'+':'')+'$'+Math.abs(s.totalPnl).toLocaleString(),accent:s.totalPnl>=0?'var(--emerald)':'var(--red-3)'},

  return `

          <div class="form-group"><label>Type d'actif</label><select id="calc-type" onchange="calcPosition()"><option value="forex">Forex (paires majeures)</option><option value="gold">Or (XAUUSD)</option><option value="indices">Indices / NAS / SPX</option><option value="crypto">Crypto</option></select></div>
        </div>

      <div class="card card-glow" id="calc-results" style="display:none">
        <div class="card-header"><div class="card-title">📊 Résultats</div></div>

          <div style="padding:16px;background:var(--bg-2);border-radius:10px;text-align:center" id="calc-rr-box"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">R:R Ratio</div><div id="calc-rr" style="font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--blue)"></div></div>

        <div id="calc-warning" style="margin-top:12px;padding:10px 14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:12px;color:var(--red-4);display:none">⚠️ Position trop grande — risque dépasse le seuil recommandé !</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
          ${[{asset:'Forex majeurs (1 lot)',val:'$10 / pip'},{asset:'Or XAUUSD (1 lot)',val:'$1 / $0.01'},{asset:'NAS100 (1 lot)',val:'$1 / point'},{asset:'SPX500 (1 lot)',val:'$1 / point'},{asset:'BTC (1 lot)',val:'Varie'},{asset:'Mini lot (0.1)',val:'x0.1'}].map(r=>`<div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--bg-2);border-radius:6px"><span style="color:var(--text-2)">${r.asset}</span><span style="font-family:var(--font-mono);color:var(--text-1);font-weight:600">${r.val}</span></div>`).join('')}

function calcPosition() {
  const capital=parseFloat(document.getElementById('calc-capital')?.value)||0, riskPct=parseFloat(document.getElementById('calc-risk')?.value)||1, entry=parseFloat(document.getElementById('calc-entry')?.value)||0, sl=parseFloat(document.getElementById('calc-sl')?.value)||0, tp=parseFloat(document.getElementById('calc-tp')?.value)||0, type=document.getElementById('calc-type')?.value||'forex';
  const results=document.getElementById('calc-results');
  if (!capital||!entry||!sl){if(results)results.style.display='none';return;}
  const riskAmount=capital*riskPct/100, slDistance=Math.abs(entry-sl);
  if (!slDistance){if(results)results.style.display='none';return;}
  let pips=0,lotSize=0;
  if(type==='forex'){pips=slDistance*10000;lotSize=riskAmount/(pips*10/100);}
  else if(type==='gold'){pips=slDistance;lotSize=riskAmount/(slDistance*100);}
  else if(type==='indices'){pips=slDistance;lotSize=riskAmount/slDistance;}
  else if(type==='crypto'){pips=slDistance;lotSize=riskAmount/slDistance;}
  const rr=tp?Math.abs(tp-entry)/slDistance:0;
  if(results)results.style.display='block';
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('calc-risk-amount','$'+riskAmount.toFixed(2)); set('calc-size',lotSize.toFixed(2)+' lots'); set('calc-pips',pips.toFixed(1)); set('calc-rr',rr?rr.toFixed(2)+'R':'—');
  const rrBox=document.getElementById('calc-rr-box'); if(rrBox)rrBox.style.opacity=rr?'1':'0.4';
  const warning=document.getElementById('calc-warning'); if(warning)warning.style.display=lotSize>10?'block':'none';
}

// CALENDAR HEATMAP
// ═══════════════════════════════════════════════════════════
function renderCalendarHeatmap() {
  const el=document.getElementById('calendarHeatmap'); if(!el) return;
  const cal=state.calendar, year=new Date().getFullYear(), startDate=new Date(year,0,1);
  const cells=[], months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'], monthPositions=[];
  let prevMonth=-1;
  for (let i=0;i<371;i++) {
    const d=new Date(startDate); d.setDate(d.getDate()+i-startDate.getDay());
    const key=d.toISOString().split('T')[0], data=cal[key], month=d.getMonth();
    if(month!==prevMonth){monthPositions.push({month,col:Math.floor(i/7)});prevMonth=month;}
    let color='var(--bg-3)';
    if(data){const intensity=Math.min(1,Math.abs(data.pnl)/200);color=data.pnl>0?`rgba(16,185,129,${0.2+intensity*0.8})`:`rgba(239,68,68,${0.2+intensity*0.8})`;}
    cells.push({key,data,color});
  }
  el.innerHTML=`<div style="overflow-x:auto;padding-bottom:8px"><div style="min-width:700px"><div style="display:flex;margin-bottom:4px;padding-left:30px"><div style="height:12px;position:relative;width:100%">${monthPositions.map(({month,col})=>`<span style="position:absolute;left:${col*14}px;font-size:10px;color:var(--text-3)">${months[month]}</span>`).join('')}</div></div><div style="display:flex;gap:3px"><div style="display:flex;flex-direction:column;gap:3px">${['D','L','M','M','J','V','S'].map(d=>`<div style="height:12px;font-size:9px;color:var(--text-3);width:16px;line-height:12px">${d}</div>`).join('')}</div><div style="display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;gap:3px">${cells.map(c=>`<div class="tooltip" style="width:12px;height:12px;border-radius:2px;background:${c.color};cursor:${c.data?'pointer':'default'};transition:transform .1s" ${c.data?`onmouseover="this.style.transform='scale(1.4)'" onmouseout="this.style.transform=''"`:''}>  ${c.data?`<span class="tooltip-text">${c.key}<br>${c.data.pnl>0?'+':''}$${c.data.pnl.toFixed(2)}<br>${c.data.trades} trades</span>`:''}</div>`).join('')}</div></div><div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text-3)"><span>Moins</span>${[0.1,0.3,0.5,0.7,0.9].map(o=>`<div style="width:10px;height:10px;border-radius:2px;background:rgba(16,185,129,${o})"></div>`).join('')}<span>Plus (gains)</span><span style="margin-left:16px">Moins</span>${[0.1,0.3,0.5,0.7,0.9].map(o=>`<div style="width:10px;height:10px;border-radius:2px;background:rgba(239,68,68,${o})"></div>`).join('')}<span>Plus (pertes)</span></div></div></div>`;
}

function renderViewTradeModal(trade) {
  if (!trade) return '';
  const pnlClass=trade.pnl>0?'pnl-pos':trade.pnl<0?'pnl-neg':'pnl-neu';
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><div class="modal-title"><span style="font-family:var(--font-mono)">${trade.asset}</span><span class="badge badge-${trade.type.toLowerCase()}" style="margin-left:10px">${trade.type}</span><span class="badge badge-${trade.status?.toLowerCase()}" style="margin-left:6px">${trade.status}</span></div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">${ICONS.close}</button></div><div class="modal-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">${[{l:'Date',v:new Date(trade.date).toLocaleString('fr-FR')},{l:'Compte',v:trade.accountId?.name||'—'},{l:'Entrée',v:trade.entryPrice?.toFixed(5)||'—',mono:true},{l:'Sortie',v:trade.exitPrice?.toFixed(5)||'—',mono:true},{l:'Stop Loss',v:trade.stopLoss?.toFixed(5)||'—',mono:true,color:'var(--red-3)'},{l:'Take Profit',v:trade.takeProfit?.toFixed(5)||'—',mono:true,color:'var(--emerald)'},{l:'Timeframe',v:trade.timeframe||'—'},{l:'Session',v:trade.session||'—'}].map(f=>`<div style="padding:12px;background:var(--bg-2);border-radius:8px"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${f.l}</div><div style="font-size:14px;color:${f.color||'var(--text-1)'};${f.mono?'font-family:var(--font-mono);':''}font-weight:500">${f.v}</div></div>`).join('')}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px"><div style="padding:16px;background:var(--bg-2);border-radius:10px;text-align:center"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:6px">P&L</div><div class="${pnlClass}" style="font-size:22px">${trade.pnl!=null?(trade.pnl>0?'+':'')+'$'+trade.pnl.toFixed(2):'—'}</div></div><div style="padding:16px;background:var(--bg-2);border-radius:10px;text-align:center"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:6px">R:R</div><div style="font-family:var(--font-mono);font-size:22px">${trade.rr?trade.rr.toFixed(2)+'R':'—'}</div></div><div style="padding:16px;background:var(--bg-2);border-radius:10px;text-align:center"><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;margin-bottom:6px">Suivi plan</div><div style="font-size:22px">${trade.followedPlan?'✅':'❌'}</div></div></div>${trade.setup?`<div style="margin-bottom:12px"><span style="font-size:11px;color:var(--text-3);text-transform:uppercase">Setup</span><div style="margin-top:4px;padding:8px 12px;background:var(--bg-2);border-radius:8px">${trade.setup}</div></div>`:''} ${trade.notes?`<div style="margin-bottom:12px"><span style="font-size:11px;color:var(--text-3);text-transform:uppercase">Notes</span><div style="margin-top:4px;padding:12px;background:var(--bg-2);border-radius:8px;font-size:14px;line-height:1.6;color:var(--text-2)">${trade.notes}</div></div>`:''} ${trade.tags?.length?`<div style="margin-bottom:12px"><span style="font-size:11px;color:var(--text-3);text-transform:uppercase">Tags</span><div style="margin-top:6px">${trade.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:''} ${trade.screenshots?.length?`<div><span style="font-size:11px;color:var(--text-3);text-transform:uppercase">Captures</span><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">${trade.screenshots.map(s=>`<img src="${s}" style="height:120px;border-radius:8px;border:1px solid var(--border);cursor:pointer;object-fit:cover" onclick="openImagePreview('${s}')" />`).join('')}</div></div>`:''}</div><div class="modal-footer"><button class="btn btn-danger" onclick="deleteTrade('${trade._id}');closeModal()">Supprimer</button><button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-primary" onclick="closeModal();openEditTrade('${trade._id}')">Modifier</button></div></div></div>`;
}

function renderAccountModal(account) {
  const isEdit=!!account;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-header"><div class="modal-title">${isEdit?'Modifier le Compte':'Nouveau Compte'}</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">${ICONS.close}</button></div><div class="modal-body"><div class="form-grid"><div class="form-group"><label>Nom du compte *</label><input id="acc-name" placeholder="ex: FTMO #12345" value="${account?.name||''}" /></div><div class="form-group"><label>Broker / Prop Firm</label><input id="acc-broker" placeholder="ex: FTMO..." value="${account?.broker||''}" /></div><div class="form-group"><label>Type</label><select id="acc-type">${['Demo','Live','Challenge','Funded','Prop'].map(t=>`<option value="${t}" ${account?.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="form-group"><label>Devise</label><select id="acc-currency">${['USD','EUR','GBP','CHF','JPY'].map(c=>`<option value="${c}" ${account?.currency===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="form-group"><label>Capital Initial *</label><input type="number" id="acc-initial" placeholder="10000" value="${account?.initialBalance||''}" /></div><div class="form-group"><label>Capital Actuel</label><input type="number" id="acc-current" placeholder="10000" value="${account?.currentBalance||''}" /></div><div class="form-group"><label>Objectif ($)</label><input type="number" id="acc-target" placeholder="12000" value="${account?.target||''}" /></div><div class="form-group"><label>Drawdown Max (%)</label><input type="number" id="acc-maxdd" placeholder="10" value="${account?.maxDrawdown||''}" /></div><div class="form-group full"><label>Notes</label><textarea id="acc-notes">${account?.notes||''}</textarea></div></div></div><div class="modal-footer">${isEdit?`<button class="btn btn-danger" onclick="deleteAccount('${account._id}')">Supprimer</button>`:''}<button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="submitAccount(${isEdit?`'${account._id}'`:'null'})">${isEdit?'Mettre à jour':'Créer le Compte'}</button></div></div></div>`;
}

function renderGoalsModal() {
  const u=state.user||{};
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:400px"><div class="modal-header"><div class="modal-title">Objectifs</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">${ICONS.close}</button></div><div class="modal-body"><div class="form-grid" style="grid-template-columns:1fr"><div class="form-group"><label>Objectif Mensuel ($)</label><input type="number" id="goal-monthly" placeholder="1000" value="${u.monthlyGoal||''}" /></div><div class="form-group"><label>Objectif Annuel ($)</label><input type="number" id="goal-annual" placeholder="12000" value="${u.annualGoal||''}" /></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="saveGoals()">Enregistrer</button></div></div></div>`;
}

function renderImportCSVModal() {
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:540px"><div class="modal-header"><div class="modal-title">📥 Import CSV</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">${ICONS.close}</button></div><div class="modal-body"><p style="color:var(--text-2);margin-bottom:16px;line-height:1.6">Colonnes reconnues: <code style="font-family:var(--font-mono);font-size:12px;background:var(--bg-2);padding:2px 6px;border-radius:4px">date, asset, type, entryPrice, exitPrice, pnl, sl, tp, rr, setup, status, notes</code></p><div class="form-group"><label>Compte (optionnel)</label><select id="import-account"><option value="">Aucun compte spécifique</option>${state.accounts.map(a=>`<option value="${a._id}">${a.name}</option>`).join('')}</select></div><div class="form-group" style="margin-top:12px"><label>Données CSV</label><textarea id="csv-data" style="min-height:200px;font-family:var(--font-mono);font-size:12px" placeholder="date,asset,type,entryPrice,exitPrice,pnl,status"></textarea></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="importCSV()">Importer</button></div></div></div>`;
}

function renderSettingsModal() {
  const u=state.user||{};
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:480px">
        <div class="modal-header"><div class="modal-title">Paramètres</div><button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">${ICONS.close}</button></div>
        <div class="modal-body">
          <div style="margin-bottom:24px">
            <div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Profil</div>
            <div class="form-grid" style="grid-template-columns:1fr">
              <div class="form-group"><label>Pseudo</label><input id="set-username" value="${u.username||''}" maxlength="40" /></div>
              <div class="form-group"><label>Email (lecture seule)</label><input value="${u.email||''}" disabled style="opacity:.5;cursor:not-allowed" /></div>
            </div>
            <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="saveProfile()">Sauvegarder le profil</button>
          </div>
          <hr class="divider" />
          <div style="margin-bottom:24px">
            <div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Changer le mot de passe</div>
            <div class="form-grid" style="grid-template-columns:1fr">
              <div class="form-group"><label>Mot de passe actuel</label><input type="password" id="set-current-pwd" placeholder="••••••••" /></div>
              <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="set-new-pwd" placeholder="Min. 8 caractères" /></div>
            </div>
            <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="savePassword()">Changer le mot de passe</button>
          </div>
          <hr class="divider" />
          <div style="margin-bottom:24px">
            <div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Préférences</div>
            <div class="form-grid">
              <div class="form-group"><label>Devise</label><select id="set-currency">${['USD','EUR','GBP','CHF','JPY'].map(c=>`<option value="${c}" ${u.settings?.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
              <div class="form-group"><label>Risque par trade (%)</label><input type="number" id="set-risk" step="0.1" min="0" max="100" value="${u.settings?.riskPerTrade||1}" /></div>
            </div>
            <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="savePreferences()">Sauvegarder</button>
          </div>
          <hr class="divider" />
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Visibilité</div>
            <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg-2);border-radius:var(--radius);border:1px solid var(--border)">
              <div>
                <div style="font-size:13px;font-weight:600;color:var(--text-1)">Journal Public</div>
                <div style="font-size:11px;color:var(--text-3);margin-top:2px">Vos stats et trades visibles par tous</div>
              </div>
              <div onclick="togglePublicJournal()" style="width:44px;height:24px;border-radius:24px;cursor:pointer;position:relative;transition:background .2s;background:${u.isPublic?'var(--red-2)':'var(--bg-4)'};border:1px solid ${u.isPublic?'var(--red-2)':'var(--border)'}">
                <div style="position:absolute;top:2px;left:${u.isPublic?'22px':'2px'};width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>
              </div>
            </div>
            ${u.isPublic?`<div style="margin-top:8px;padding:8px 12px;background:rgba(229,57,53,.06);border:1px solid rgba(229,57,53,.15);border-radius:var(--radius);font-size:11px;color:var(--red-4)">🔗 Votre journal est visible dans "Journaux Publics"</div>`:''}
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" onclick="if(confirm('Déconnexion ?'))logout()">Déconnexion</button>
          <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
        </div>
      </div>
    </div>
  `;
}

function renderSkeleton() {
  return `<div class="stats-grid" style="margin-bottom:24px">${Array(8).fill(`<div class="stat-card"><div class="skeleton" style="height:12px;width:60%;margin-bottom:10px"></div><div class="skeleton" style="height:28px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:10px;width:50%"></div></div>`).join('')}</div><div class="card"><div class="skeleton" style="height:300px"></div></div>`;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function attachListeners() {}
function setPage(page) { state.page=page; document.getElementById('sidebar')?.classList.remove('open'); render(); setTimeout(renderAllCharts,100); }
function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('open'); }
function openAddTrade() { state.modalType='addTrade'; state.modalOpen=true; state.editTrade=null; pendingScreenshots=[]; render(); }
async function openEditTrade(id) { try { const trade=await api('/trades/'+id); state.editTrade=trade; state.modalType='editTrade'; state.modalOpen=true; render(); } catch(e){showToast(e.message,'error');} }
async function openViewTrade(id) { try { const trade=await api('/trades/'+id); state.editTrade=trade; state.modalType='viewTrade'; state.modalOpen=true; render(); } catch(e){showToast(e.message,'error');} }
function openAddAccount() { state.modalType='addAccount'; state.editAccount=null; state.modalOpen=true; render(); }
function openEditAccount(id) { state.editAccount=state.accounts.find(a=>a._id===id); state.modalType='editAccount'; state.modalOpen=true; render(); }
function openGoalsEdit() { state.modalType='goals'; state.modalOpen=true; render(); }
function openImportCSV() { state.modalType='importCSV'; state.modalOpen=true; render(); }
function openSettings() { state.modalType='settings'; state.modalOpen=true; render(); }
function closeModal() { state.modalOpen=false; state.modalType=null; state.editTrade=null; state.editAccount=null; render(); }

async function submitTrade(evt, id) {
  if (evt) evt.preventDefault();
  const form=document.getElementById('tradeForm'); if(!form) return;
  const data=Object.fromEntries(new FormData(form));
  ['entryPrice','exitPrice','stopLoss','takeProfit','pnl','rr','lotSize','commission'].forEach(f=>{if(data[f]!==undefined&&data[f]!=='')data[f]=parseFloat(data[f]);else delete data[f];});
  if (data.tags) data.tags=data.tags.split(',').map(t=>t.trim()).filter(Boolean);
  if (!data.accountId) delete data.accountId;
  if (pendingScreenshots.length>0) data.screenshots=pendingScreenshots;
  try {
    if (id){await api('/trades/'+id,{method:'PUT',body:JSON.stringify(data)});showToast('Trade mis à jour ✅');}
    else {await api('/trades',{method:'POST',body:JSON.stringify(data)});showToast('Trade enregistré ✅');}
    pendingScreenshots=[]; closeModal(); await loadAll();
  } catch(e){showToast(e.message,'error');}
}
async function deleteTrade(id) { if(!confirm('Supprimer ce trade ?'))return; try{await api('/trades/'+id,{method:'DELETE'});showToast('Trade supprimé');closeModal();await loadAll();}catch(e){showToast(e.message,'error');} }
async function submitAccount(id) {
  const get=s=>document.getElementById(s)?.value;
  const data={name:get('acc-name'),broker:get('acc-broker'),type:get('acc-type'),currency:get('acc-currency'),initialBalance:parseFloat(get('acc-initial')),currentBalance:parseFloat(get('acc-current')||get('acc-initial')),target:get('acc-target')?parseFloat(get('acc-target')):undefined,maxDrawdown:get('acc-maxdd')?parseFloat(get('acc-maxdd')):undefined,notes:get('acc-notes')};
  if (!data.name||!data.initialBalance){showToast('Remplissez les champs obligatoires','error');return;}
  try{if(id){await api('/accounts/'+id,{method:'PUT',body:JSON.stringify(data)});showToast('Compte mis à jour ✅');}else{await api('/accounts',{method:'POST',body:JSON.stringify(data)});showToast('Compte créé ✅');}closeModal();await loadAll();}catch(e){showToast(e.message,'error');}
}
async function deleteAccount(id) { if(!confirm('Supprimer ce compte ?'))return; try{await api('/accounts/'+id,{method:'DELETE'});showToast('Compte supprimé');closeModal();await loadAll();}catch(e){showToast(e.message,'error');} }
async function saveGoals() {
  const monthly=parseFloat(document.getElementById('goal-monthly')?.value)||0, annual=parseFloat(document.getElementById('goal-annual')?.value)||0;
  try{await api('/auth/settings',{method:'PATCH',body:JSON.stringify({monthlyGoal:monthly,annualGoal:annual})});state.user.monthlyGoal=monthly;state.user.annualGoal=annual;showToast('Objectifs enregistrés');closeModal();render();}catch(e){showToast(e.message,'error');}
}
async function importCSV() {
  const csvData=document.getElementById('csv-data')?.value, accountId=document.getElementById('import-account')?.value;
  if (!csvData?.trim()){showToast('Collez vos données CSV','error');return;}
  try{const result=await api('/trades/import/csv',{method:'POST',body:JSON.stringify({csvData,accountId:accountId||null})});showToast(`${result.imported} trades importés ✅`);closeModal();await loadAll();}catch(e){showToast(e.message,'error');}
}
let filterTimer;
function updateFilter(key,value){state.filters[key]=value;state.page_num=1;clearTimeout(filterTimer);filterTimer=setTimeout(async()=>{await loadTrades();render();},400);}
function clearFilters(){state.filters={search:'',asset:'',type:'',status:'',from:'',to:''};state.page_num=1;loadTrades().then(()=>render());}
function changePage(p){state.page_num=p;loadTrades().then(()=>render());}
async function changeAccount(id){state.selectedAccount=id;state.page_num=1;await loadAll();}
async function saveProfile() {
  const username=document.getElementById('set-username')?.value?.trim();
  if (!username){showToast('Pseudo requis','error');return;}
  try{await api('/auth/profile',{method:'PATCH',body:JSON.stringify({username})});state.user.username=username;showToast('Profil mis à jour ✅');render();}catch(e){showToast(e.message,'error');}
}
async function savePassword() {
  const currentPassword=document.getElementById('set-current-pwd')?.value, newPassword=document.getElementById('set-new-pwd')?.value;
  if (!currentPassword||!newPassword){showToast('Remplissez les deux champs','error');return;}
  try{await api('/auth/password',{method:'PATCH',body:JSON.stringify({currentPassword,newPassword})});showToast('Mot de passe mis à jour ✅');document.getElementById('set-current-pwd').value='';document.getElementById('set-new-pwd').value='';}catch(e){showToast(e.message,'error');}
}
async function savePreferences() {
  const currency=document.getElementById('set-currency')?.value, riskPerTrade=parseFloat(document.getElementById('set-risk')?.value)||1;
  try{await api('/auth/settings',{method:'PATCH',body:JSON.stringify({currency,riskPerTrade})});state.user.settings.currency=currency;state.user.settings.riskPerTrade=riskPerTrade;showToast('Préférences sauvegardées ✅');}catch(e){showToast(e.message,'error');}
}
async function togglePublicJournal() {
  try {
    const newVal = !state.user.isPublic;
    await api('/auth/settings', {method:'PATCH', body:JSON.stringify({isPublic:newVal})});
    state.user.isPublic = newVal;
    showToast(newVal ? 'Journal rendu public ✅' : 'Journal masqué');
    openSettings();
  } catch(e) { showToast(e.message, 'error'); }
}
function switchAuthTab(tab){state.authTab=tab;state.authError='';state.authSuccess='';render();setTimeout(()=>{const first=document.querySelector('.auth-input');if(first)first.focus();},50);}
function checkPwdStrength(val){const el=document.getElementById('pwd-strength');if(!el)return;const score=[val.length>=8,/[A-Z]/.test(val),/[0-9]/.test(val),/[^A-Za-z0-9]/.test(val)].filter(Boolean).length;el.style.background=['','#ef4444','#f59e0b','#3b82f6','#10b981'][score]||'transparent';el.style.width=['0%','25%','50%','75%','100%'][score];}
async function submitLogin() {
  const email=document.getElementById('login-email')?.value?.trim(), password=document.getElementById('login-password')?.value, btn=document.getElementById('login-btn');
  if (!email||!password){state.authError='Remplissez tous les champs.';render();return;}
  if (btn){btn.disabled=true;btn.textContent='Connexion…';}
  try{const data=await api('/auth/login',{method:'POST',body:JSON.stringify({email,password})});localStorage.setItem('pj_token',data.token);state.user=data.user;state.authError='';await loadAll();}
  catch(e){state.authError=e.message;render();if(btn){btn.disabled=false;btn.textContent='Se connecter';}}
}
async function submitRegister() {
  const username=document.getElementById('reg-username')?.value?.trim(), email=document.getElementById('reg-email')?.value?.trim(), password=document.getElementById('reg-password')?.value, btn=document.getElementById('reg-btn');
  if (!username||!email||!password){state.authError='Remplissez tous les champs.';render();return;}
  if (btn){btn.disabled=true;btn.textContent='Création…';}
  try{const data=await api('/auth/register',{method:'POST',body:JSON.stringify({username,email,password})});localStorage.setItem('pj_token',data.token);state.user=data.user;state.authError='';await loadAll();}
  catch(e){state.authError=e.message;render();if(btn){btn.disabled=false;btn.textContent='Créer mon compte';}}
}
async function logout() { try{await api('/auth/logout',{method:'POST'});}catch{} localStorage.removeItem('pj_token');state.user=null;state.authTab='login';state.authError='';render(); }

function showToast(msg,type='success') {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const toast=document.createElement('div');
  toast.className='toast';
  toast.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--font-body);animation:slideUp .25s;box-shadow:0 8px 30px rgba(0,0,0,.4);${type==='error'?'background:#1a0a0a;color:#f87171;border:1px solid rgba(239,68,68,.3)':'background:#0a1a12;color:#34d399;border:1px solid rgba(16,185,129,.3)'}`;
  toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(),3000);
}
function toggleTheme(){const isLight=document.body.classList.toggle('light');localStorage.setItem('pj_theme',isLight?'light':'dark');render();}
function initTheme(){if(localStorage.getItem('pj_theme')==='light')document.body.classList.add('light');}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  initTheme();
  const loggedIn = await loadUser();
  if (loggedIn) { await loadAll(); }
  else { state.loading=false; render(); }
}
init();
</script>
</body>
</html>
